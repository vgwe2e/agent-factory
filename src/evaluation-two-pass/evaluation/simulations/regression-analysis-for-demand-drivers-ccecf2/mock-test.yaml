decision: >-
  Quantify and set demand-driver weightings, accept or adjust integrated
  forecast recommendations, and decide whether to deploy optimized forecasts and
  procurement/production adjustments to SAP S/4HANA or route for human review.
input:
  financial_context:
    annual_revenue: 184992000001
    cogs: 158434000000
    ebitda: 12786000000
    inventory_value: 14951000000
  trigger: >-
    Scheduled weekly forecast cycle or event-driven trigger when demand deviates
    from baseline by >X% (business threshold).
  parameters:
    objective: >-
      Establish an autonomous pipeline that integrates time-series forecasting
      and regression-based demand driver analysis to produce optimized,
      deployable demand forecasts that reduce COGS and working capital across
      Ford's multi-echelon supplier-plant-DC network.
    key_inputs:
      - Historical shipments & sales (SKU-location-time)
      - Material lead times & inventory levels
      - Promotions, incentives, and launch schedules
      - Supplier capacity & constraints
      - Macro / market indicators (fuel prices, consumer sentiment)
    source_systems:
      - SAP S/4HANA
      - Dealer POS / Retail Sales
      - Market / Macroeconomic Indicators API
expected_output:
  action: >-
    Orchestrate DDM/STREAMS ingestion, run Cortex Auto Forecast (time-series)
    and AutoML regression (demand drivers), reconcile outputs in Process
    Builder, present recommendations via CWB Lifecycle for approval, and write
    optimized plans back to SAP S/4HANA (or queue exceptions).
  outcome: >-
    Higher forecast accuracy (lower MAPE), reduced stockouts and excess
    inventory across echelons, tighter material planning that trims COGS and
    lowers working capital, and continuous measurement of model performance for
    periodic retraining.
  affected_components:
    - DDM/Crawlers + STREAMS
    - Cortex Auto Forecast
    - AutoML
    - Process Builder + CWB Lifecycle
    - Remote Functions
    - Cortex Monitoring + Subject Areas
    - Dashboard
rationale: >-
  Combining automated time-series forecasting with regression analysis of demand
  drivers ensures forecasts reflect both historical patterns and causal signals.
  Orchestrating model development, deployment, and measurement via Process
  Builder + Cortex + CWB Lifecycle enables repeatable, auditable adjustments to
  planning that align procurement and production across suppliers, plants, and
  DCs.
