source_systems:
  - name: SAP S/4HANA
    type: ERP
    status: identified
  - name: MES / Line Control
    status: tbd
  - name: Plant Historian / OEE
    status: tbd
aera_ingestion:
  - stream_name: production-orders-mrp-results
    stream_type: delta
    source: SAP S/4HANA
  - stream_name: routing-bom-work-centers-standard-times
    stream_type: batch
    source: SAP S/4HANA
  - stream_name: line-capacity-real-time-run-state
    stream_type: delta
    source: MES / Line Control
  - stream_name: changeover-time-matrix-model-variant-pair
    stream_type: Event Stream
    source: Plant Historian / MES (historical + calibrated)
  - stream_name: demand-forecast-prioritization-rules
    stream_type: batch
    source: SAP S/4HANA / Cortex Auto Forecast
  - stream_name: business-policies-constraint-set
    stream_type: Event Stream
    source: Business rules (Process Builder / Config)
processing:
  - component: Remote Functions (solver) invoked by Process Builder
    type: cortex
    function: >-
      Compute optimal sequences and changeover plans minimizing total production
      cost subject to constraints
  - component: CWB Lifecycle (recommendation view)
    type: process_builder
    function: >-
      Allow planners to accept, override, or request alternative scenarios
      (human-in-the-loop)
  - component: Process (Process Builder) + Remote Functions (SAP writeback)
    type: process_builder
    function: >-
      Execute transactional writeback of order start times, line assignments,
      and changeover instructions to SAP S/4HANA and MES
  - component: Subject Areas + Process (Rules & Notifications)
    type: process_builder
    function: >-
      Detect deviations (e.g., extended changeovers), update schedule forecasts,
      notify stakeholders, and auto-reschedule if within policy
ui_surface:
  - component: Dashboard
    screen: Primary
    purpose: >-
      Review automatically generate and release changeover-aware, multi-plant
      production schedules that minimize total production cost while meeting
      demand and operational constraints, with continuous execution monitoring
      and autonomous exception handling. and approve the recommended action.
