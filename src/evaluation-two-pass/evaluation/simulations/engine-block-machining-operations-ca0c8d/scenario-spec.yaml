objective: >-
  Orchestrate precision machining of engine blocks (boring, honing, deck
  surfacing) to determine optimal fabrication sequence and process routing that
  minimizes COGS while meeting quality tolerances and delivery dates.
trigger: >-
  New or updated production order for engine block machining received from SAP
  S/4HANA (quantity, due date, and routing constraints).
decision: >-
  Direct machining production decisions for engine block fabrication sequence
  and process routing to optimize COGS.
expected_action: >-
  Process Builder evaluates production order, machine/tooling availability, and
  quality constraints; applies rules to select machining sequence and feeds
  optimized routing and work instructions back to SAP S/4HANA and the shop-floor
  UI (dispatch work order, reserve tooling, schedule machines, and create QC
  checkpoints).
expected_outcome: >-
  Optimized machining routes dispatched to shop floor, updated production orders
  in SAP S/4HANA, reduced COGS via improved machine utilization and reduced
  rework, and traceable QC checkpoints for each lot.
rationale: >-
  Deterministic, rule-driven decisioning suits Process Builder orchestration.
  Use STREAMS/DDM for ingest from SAP and peripheral systems, Rules and IF nodes
  for deterministic routing and sequencing logic, and Transaction nodes for
  controlled writeback to SAP S/4HANA. UI Screen and Notification components
  provide shop-floor instructions and exceptions. Medium complexity driven by
  multi-source inputs (production, tooling, machine availability) and SAP
  writeback needs.
source_systems:
  - name: SAP S/4HANA
    type: ERP
    status: identified
  - name: MES
    type: Manufacturing Execution System
    status: tbd
  - name: Tooling Database
    type: CMMS/Asset DB
    status: tbd
  - name: Machine Sensors / PLCs
    type: IoT
    status: tbd
  - name: QMS
    type: Quality Management System
    status: tbd
key_inputs:
  - name: Production Order (engine block)
    source: SAP S/4HANA
    purpose: >-
      Defines part, quantity, due date, routing constraints and target COGS
      impact
    preferred_stream_type: DDM/Crawlers
  - name: Machine Availability & Capacity
    source: MES / Machine Sensors
    purpose: >-
      Determine available machines, shift schedules, and utilization to sequence
      operations
    preferred_stream_type: STREAMS
  - name: Tooling Status & Inventory
    source: Tooling Database
    purpose: >-
      Ensure required fixtures, cutters, and gauges are available and reserve
      tooling
    preferred_stream_type: STREAMS
  - name: Material Lot & Traceability
    source: SAP S/4HANA / MES
    purpose: Associate material lot with machining operations and QC checkpoints
    preferred_stream_type: DDM/Crawlers
  - name: Process Parameters & Standard Work
    source: Engineering / Process Docs
    purpose: Provide cutting speeds, feeds, tolerance targets, and sequencing rules
  - name: Quality Tolerances and QC Rules
    source: QMS
    purpose: Define inspection points, acceptable ranges and rework triggers
happy_path:
  - step: Ingest production order and master data
    stage: ingest
    component: STREAMS
    purpose: >-
      Pull production order, part master, routing constraints, and tooling
      inventory into Subject Areas
  - step: Evaluate machine/tool availability and apply sequencing rules
    stage: analyze
    component: Rules
    purpose: >-
      Deterministically select machining sequence (boring → honing → deck
      surfacing or merged operations) based on availability, cost, and tolerance
      requirements
  - step: Decision branching for selected route
    stage: decide
    component: IF
    purpose: >-
      Choose final routing: standard cell, alternate cell, or deferred
      scheduling based on rules and capacity
  - step: Commit schedule and create shop work order
    stage: act
    component: Transaction
    purpose: >-
      Write optimized routing/schedule and tooling reservations back to SAP
      S/4HANA and MES
  - step: Publish work instructions and QC checkpoints to operators
    stage: surface
    component: UI Screen
    purpose: >-
      Present step-by-step machining instructions, tooling attachments, and QC
      checks on shop-floor terminals
  - step: Notify stakeholders and record execution report
    stage: notify
    component: Notification
    purpose: >-
      Alert production planner of schedule commit and generate Report Data for
      post-run review
branches:
  - condition: Required machine(s) unavailable for the planned sequence
    response: >-
      Rules node routes to alternate machining cell or defers to next available
      slot; Transaction updates SAP with revised schedule
    outcome: >-
      Routing adjusted to maintain throughput with minimal COGS impact;
      scheduler and operators notified
  - condition: Tooling shortage or mismatch detected
    response: >-
      Process triggers tooling reservation attempt; if unavailable, Branch node
      flags exception and creates Action Item for tool procurement or
      re-sequencing
    outcome: >-
      Avoid machining with improper tooling; either procurement initiated or
      sequence changed to use available tooling
  - condition: Quality tolerance conflict (design vs. machine capability)
    response: >-
      Rules node flags exception and creates CWB Lifecycle-style Action Item for
      engineering review (manual override or updated process parameters)
    outcome: >-
      Ensure only compliant routings proceed; prevents out-of-spec production
      and costly rework
