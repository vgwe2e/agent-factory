streams:
  - name: STREAMS
    purpose: >-
      Pull production order, part master, routing constraints, and tooling
      inventory into Subject Areas
    confidence: confirmed
    type: STREAMS
cortex: []
process_builder:
  - name: Rules
    purpose: >-
      Deterministically select machining sequence (boring → honing → deck
      surfacing or merged operations) based on availability, cost, and tolerance
      requirements
    confidence: confirmed
    node_type: control_flow
  - name: IF
    purpose: >-
      Choose final routing: standard cell, alternate cell, or deferred
      scheduling based on rules and capacity
    confidence: confirmed
    node_type: control_flow
  - name: Transaction
    purpose: >-
      Write optimized routing/schedule and tooling reservations back to SAP
      S/4HANA and MES
    confidence: confirmed
    node_type: transaction
  - name: UI Screen
    purpose: >-
      Present step-by-step machining instructions, tooling attachments, and QC
      checks on shop-floor terminals
    confidence: confirmed
    node_type: integration
  - name: Notification
    purpose: >-
      Alert production planner of schedule commit and generate Report Data for
      post-run review
    confidence: confirmed
    node_type: communication
agent_teams: []
ui:
  - name: Dashboard
    purpose: >-
      Review orchestrate precision machining of engine blocks (boring, honing,
      deck surfacing) to determine optimal fabrication sequence and process
      routing that minimizes cogs while meeting quality tolerances and delivery
      dates. and approve the recommended action.
    confidence: confirmed
    component_type: display
