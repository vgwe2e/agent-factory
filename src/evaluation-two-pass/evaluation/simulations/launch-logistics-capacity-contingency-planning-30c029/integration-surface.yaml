source_systems:
  - name: SAP S/4HANA
    type: ERP
    status: identified
  - name: Transportation Management System (TMS)
    type: TMS
    status: tbd
  - name: Warehouse Management System (WMS)
    type: WMS
    status: tbd
  - name: PLM / Launch Schedule
    type: PLM
    status: tbd
  - name: Carrier APIs / 3PL feeds
    type: External API
    status: tbd
  - name: External Risk Feeds (weather, port congestion)
    type: External Feed
    status: tbd
aera_ingestion:
  - stream_name: launch-schedule-sequencing
    stream_type: DDM/Crawlers
    source: PLM / SAP S/4HANA
  - stream_name: inventory-balances-multi-echelon
    stream_type: STREAMS
    source: SAP S/4HANA
  - stream_name: warehouse-capacity-slotting
    stream_type: STREAMS
    source: WMS
  - stream_name: transportation-etas-and-carrier-capacity
    stream_type: DDM/Crawlers
    source: TMS / Carrier APIs
  - stream_name: packaging-constraints-sequence-rules
    stream_type: DDM/Crawlers
    source: PLM / Packaging spec repository
  - stream_name: service-level-targets-and-cost-risk-policy
    stream_type: Event Stream
    source: Business rules store
  - stream_name: external-disruption-signals-weather-port-closures
    stream_type: DDM/Crawlers
    source: External Risk Feeds
processing:
  - component: Process Builder - Rules + Remote Functions (cost/lead-time calcs)
    type: cortex
    function: >-
      Score alternatives (alternate carrier, buffer pull, split shipments,
      sequence change) against policy thresholds.
  - component: Process Builder - IF + CWB Lifecycle
    type: process_builder
    function: >-
      Select automated activation vs. human-in-the-loop approval based on
      cost/resilience trade-offs.
  - component: Remote Functions (ERP writeback) + Process Builder - Transaction
    type: process_builder
    function: Trigger operational changes in source systems to effect contingency.
  - component: Process Builder - Notification + UI Screen (dashboard)
    type: process_builder
    function: >-
      Ensure traceability, stakeholder awareness, and provide interface for
      overrides.
ui_surface:
  - component: Dashboard
    screen: Primary
    purpose: >-
      Review orchestrate semi-autonomous, multi-echelon logistics decisions
      during automotive model launches to minimize cogs, protect otif service
      levels, and accelerate time-to-market by coordinating inbound/outbound
      routing, packaging sequencing, and contingency activation. and approve the
      recommended action.
