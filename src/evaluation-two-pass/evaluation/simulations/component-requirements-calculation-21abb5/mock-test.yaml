decision: >-
  Compute net component requirements from MPS and determine material release
  quantities and timing (including safety stock adjustments and supplier release
  recommendations) to minimize material cost and avoid shortages.
input:
  financial_context:
    annual_revenue: 184992000001
    cogs: 158434000000
    ebitda: 12786000000
    inventory_value: 14951000000
  trigger: >-
    Scheduled MPS update or BOM release event in SAP S/4HANA (daily or
    on-demand), or detection of inventory shortfall exceeding threshold.
  parameters:
    objective: >-
      Automate end-to-end MRP decisions across BOM release, component
      requirements calculation, supplier release, and dynamic safety stock to
      reduce COGS, improve OTIF, and optimize working capital in a multi-echelon
      automotive network.
    key_inputs:
      - Master Production Schedule (MPS)
      - Bill of Materials (BOM) / BOM Release
      - On-hand Inventory & Reservations
      - Open Purchase Orders / Supplier Commitments
      - Supplier Lead Times & Constraints
      - Inventory Policy & Safety Stock Targets
      - Lot-sizing & Procurement Rules (min/max, EOQ, multiples)
      - Demand Forecast (if used to supplement MPS)
    source_systems:
      - SAP S/4HANA
expected_output:
  action: >-
    Orchestrate deterministic MRP calculations, route recommended component
    release quantities to planners for CWB approval, and write approved
    releases/back-to-back POs to SAP S/4HANA while notifying suppliers and
    updating inventory reservations.
  outcome: >-
    Timely, cost-efficient material releases with reduced stockouts and excess
    inventory, improved OTIF and working capital, and automated feedback to
    inventory policies and supplier lead-time settings.
  affected_components:
    - STREAMS
    - Process (Process Builder) -> Remote Functions
    - CWB Lifecycle + UI Screen
    - Remote Functions (ERP Writeback)
    - Process (Notification) -> Safety Stock Service (or Data View)
    - Dashboard
rationale: >-
  Combining deterministic MRP calculations with automated orchestration, ERP
  writeback, and human-in-the-loop approvals lets the organization enforce BOM
  integrity, proactively plan materials, and coordinate supplier releases while
  maintaining governance and minimizing manual intervention.
