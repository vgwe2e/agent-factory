objective: >-
  Autonomously rebalance multi-echelon inventory and optimize warehouse slotting
  to reduce COGS, lower working capital, and improve SG&A efficiency while
  ensuring material handling capacity constraints are respected.
trigger: >-
  Scheduled nightly run and on-demand run after major inbound receipts or
  plant/DC transfer confirmations.
decision: >-
  Determine disposition for obsolete/excess SKUs (dispose, repurpose, sell,
  retain) and compute slotting reassignments and transfer plans that respect
  material handling capacity and safety stock constraints.
expected_action: >-
  Process Builder orchestrates ETL, rule-based scoring, optimization checks, and
  automated writebacks to SAP S/4HANA for disposition and transfer orders;
  exceptions and high-impact recommendations are routed via CWB Lifecycle for
  planner approval; notifications and dashboard updates are published.
expected_outcome: >-
  Automated disposition and slotting moves executed with audit trail and ERP
  writebacks; measurable reductions in obsolete inventory and working capital,
  improved slot utilization and reduced handling moves; timely escalation of
  high-risk decisions to planners.
rationale: >-
  Deterministic, process-driven orchestration is appropriate because disposition
  and slotting decisions follow established business rules and constraints
  (aging thresholds, demand forecasts, MHE capacity). Use STREAMS/DDM for
  reliable ETL, Process Builder for multi-step orchestration, Rules and CWB
  Lifecycle for deterministic decisioning with human-in-the-loop for high-impact
  cases, and Remote Functions for safe ERP writebacks.
source_systems:
  - name: SAP S/4HANA
    type: ERP
    status: identified
  - name: Warehouse Management System (WMS)
    status: tbd
  - name: Material Handling Schedule / MHE Roster
    status: tbd
key_inputs:
  - name: Inventory ledger (on-hand, lot, location)
    source: SAP S/4HANA
    purpose: >-
      Baseline on-hand quantities, valuation, lot/serial and location for
      disposition and slotting decisions
    preferred_stream_type: STREAMS
  - name: Cycle count and physical audit results
    source: WMS or operator uploads
    purpose: >-
      Validate physical vs ledger quantities and identify
      discrepancies/obsolescence
    preferred_stream_type: Report Data
  - name: Aging and sales velocity (SKU-level)
    source: Subject Areas / STREAMS derived from ERP and demand history
    purpose: >-
      Identify slow-moving and potentially obsolete SKUs and feed disposition
      rules
    preferred_stream_type: STREAMS
  - name: Material handling capacity and shift window
    source: MHE schedule / operations system
    purpose: Constrain transfer and slotting move plans to available handling capacity
  - name: Forecast / demand signal
    source: Cortex Auto Forecast or Subject Area forecast
    purpose: Avoid disposing or moving SKUs needed by near-term demand
    preferred_stream_type: Data View
happy_path:
  - step: Ingest authoritative inventory, cycle counts, and handling capacity
    stage: ingest
    component: DDM/Crawlers
    purpose: Pull nightly snapshot of SAP S/4HANA ledger, WMS counts, and MHE schedules
  - step: Normalize, validate and compute inventory health metrics
    stage: analyze
    component: STREAMS
    purpose: >-
      Compute aging, excess, turnover, slotting score, and flag obsolescence
      candidates
  - step: >-
      Apply deterministic business rules and generate disposition & move
      recommendations
    stage: decide
    component: Process (Process Builder) + Rules + Data View
    purpose: >-
      Score candidates, respect safety stock/forecast, and create prioritized
      disposition and slotting plans
  - step: Execute automated actions and escalate exceptions
    stage: act
    component: Remote Functions + CWB Lifecycle (Action Item)
    purpose: >-
      Write transfer/disposition orders to SAP S/4HANA and route high-impact
      recommendations to planners for approval
  - step: Surface results and monitor KPIs
    stage: surface
    component: UI Screen (dashboard) + Notification
    purpose: >-
      Display executed changes, pending approvals, and KPIs (obsolete inventory,
      slot utilization, handling moves)
branches:
  - condition: SKU flagged obsolete/excess and value below low-cost threshold
    response: >-
      Auto-generate disposal write-off and immediate ERP disposition writeback
      via Remote Functions; log transaction.
    outcome: >-
      Low-cost obsolescence processed without manual review, reducing holding
      cost and minimizing planner workload
  - condition: >-
      SKU flagged obsolete/excess but replacement value or potential resale >
      threshold
    response: >-
      Create CWB Lifecycle recommendation and route to inventory planner for
      review with supporting rationale and alternative disposition options.
    outcome: >-
      High-impact dispositions are human-reviewed to avoid premature write-offs
      and capture salvage value
  - condition: >-
      Planned transfer/slotting moves exceed material handling capacity or
      conflict with peak operations
    response: >-
      Process Builder postpones moves, reschedules them into allowable windows,
      and notifies operations and suppliers; maintain temporary holds in Subject
      Areas.
    outcome: >-
      Moves are deferred to feasible windows preserving operations continuity
      and avoiding MHE overload
