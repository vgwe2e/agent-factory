source_systems:
  - name: SAP S/4HANA
    type: ERP
    status: identified
  - name: Dealer Service Portal
    status: tbd
  - name: Field Service Management / Campaign Management
    status: tbd
aera_ingestion:
  - stream_name: historical-service-parts-demand-sales-service-orders-returns
    stream_type: batch
    source: SAP S/4HANA
  - stream_name: >-
      parts-master-lifecycle-metadata-sku-substitute-parts-bom-linkage-ev-component-flags
    stream_type: Event Stream
    source: SAP S/4HANA
  - stream_name: recall-campaign-schedules-and-severity-signals
    stream_type: Event Stream
    source: Field Service Management / Campaign Management
  - stream_name: dealer-repair-order-failure-rates-and-usage-signals
    stream_type: daily_batch
    source: Dealer Service Portal
  - stream_name: inventory-on-hand-inbound-receipts-open-pos
    stream_type: batch
    source: SAP S/4HANA
processing:
  - component: Cortex Auto Forecast
    type: cortex
    function: >-
      Generate probabilistic forecasts, seasonality detection, and feature
      explainability for each SKU
  - component: Process Builder
    type: process_builder
    function: >-
      Translate forecasts into replenishment quantities, timing, and prioritized
      allocations; flag exceptions for human review
  - component: Remote Functions
    type: process_builder
    function: Create/adjust POs, transfer reservations, and update supply plans in SAP
  - component: UI Screens
    type: process_builder
    function: Enable human review, approvals, and audit trail for exception handling
  - component: Cortex Monitoring
    type: process_builder
    function: >-
      Continuous improvement loop to reduce variance, excess inventory, and
      improve OTIF
ui_surface:
  - component: Dashboard
    screen: Primary
    purpose: >-
      Review unify six service-parts demand processes into a single end-to-end
      decision engine that autonomously generates sku-level forecasts, adapts
      inputs in near real time, mitigates excess/obsolete inventory, plans for
      recalls/campaigns, and models lifecycle-driven demand for ev components to
      align inventory and procurement with demand signals. and approve the
      recommended action.
