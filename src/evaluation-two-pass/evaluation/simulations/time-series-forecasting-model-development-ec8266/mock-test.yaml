decision: >-
  Select and deploy the optimal demand forecast and inventory plan across
  multi-echelon network (supplier → plant → DC) and determine automated vs.
  human-reviewed writeback to SAP S/4HANA
input:
  financial_context:
    annual_revenue: 184992000001
    cogs: 158434000000
    ebitda: 12786000000
    inventory_value: 14951000000
  trigger: >-
    Scheduled weekly forecast cycle or arrival of new sales/inventory snapshot
    from SAP S/4HANA
  parameters:
    objective: >-
      Autonomously develop, deploy, and operate time-series demand models and
      integrated forecast optimization across supplier-plant-DC network to
      reduce stockouts and excess, tighten COGS, and lower working capital.
    key_inputs:
      - historical_sales_orders
      - inventory_on_hand_by_location
      - supplier_lead_times_and_lot_sizes
      - production_capacity_and_schedule
      - market_signals_and_promotions
    source_systems:
      - SAP S/4HANA
      - Market Data Provider
      - Supplier Collaboration Portal
expected_output:
  action: >-
    Orchestrate data ingest and transformation, run Cortex Auto Forecast to
    generate demand forecasts and driver explainability, apply business rules
    and optimization in Process Builder, create CWB recommendations for
    exceptions, and write accepted forecasts/plans back to SAP S/4HANA via
    Remote Functions
  outcome: >-
    Improved forecast accuracy and explainability, reduced stockouts and excess
    inventory across supplier-plant-DC tiers, lower working capital and tighter
    COGS, and auditable human-in-the-loop exceptions when needed
  affected_components:
    - DDM/Crawlers
    - STREAMS
    - Cortex Auto Forecast
    - Process Builder
    - Remote Functions
    - CWB Lifecycle
    - Dashboard
rationale: >-
  A deterministic, process-driven DI route coordinates ETL, automated
  forecasting, rule-based decisioning, and controlled writebacks. Using Cortex
  forecasting and Process Builder orchestration enables repeatable model
  development, operational deployment, and measurable KPI improvements across
  the supply network while preserving ERP data integrity via Remote Functions
  and CWB-based approvals.
