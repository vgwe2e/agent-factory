source_systems:
  - name: SAP S/4HANA
    type: ERP
    status: identified
  - name: MES
    status: tbd
  - name: Supplier Portal / EDI / API
    status: tbd
  - name: WMS / Warehouse System
    status: tbd
aera_ingestion:
  - stream_name: boms-ecos-released-engineering-bills
    stream_type: STREAMS
    source: SAP S/4HANA
  - stream_name: material-requirements-mrp-outputs-planned-orders-shortages
    stream_type: STREAMS
    source: SAP S/4HANA
  - stream_name: inventory-balances-multi-echelon-positions
    stream_type: STREAMS
    source: SAP S/4HANA
  - stream_name: open-pos-and-supplier-confirmations
    stream_type: STREAMS
    source: SAP S/4HANA
  - stream_name: production-schedule-planned-orders
    stream_type: Event Stream
    source: MES
  - stream_name: demand-forecast-and-forecast-deltas
    stream_type: Event Stream
    source: Cortex Auto Forecast
  - stream_name: supplier-constraints-lead-time-variability-capacity
    stream_type: DDM/Crawlers
    source: Supplier Portal / EDI / API
  - stream_name: historical-usage-lead-time-distribution-cost-metrics
    stream_type: Subject Areas
    source: Subject Areas
processing:
  - component: Cortex Auto Forecast + Safety Stock Service + RCA Service
    type: cortex
    function: >-
      Forecast demand, compute dynamic safety stock, and surface root-cause
      drivers of potential shortages.
  - component: Remote Functions
    type: process_builder
    function: >-
      Write changes back to SAP S/4HANA and trigger supplier communications or
      MES schedule updates.
  - component: Process Builder (Agent Team / agentic_ai) + Rules
    type: agent_teams
    function: >-
      Apply decision logic and agent reasoning to pick the optimal mitigation
      action balancing cost vs. service.
ui_surface:
  - component: UI Screen / CWB Lifecycle / Notification
    screen: Primary
    purpose: >-
      Provide transparency, allow manual overrides where required, and notify
      stakeholders of executed changes.
