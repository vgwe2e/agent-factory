source_systems:
  - name: SAP S/4HANA
    type: ERP
    status: identified
  - name: Time & Attendance System
    status: tbd
  - name: Learning Management System (LMS)
    status: tbd
  - name: Contingent Staffing Vendor Portal
    status: tbd
aera_ingestion:
  - stream_name: production-plan-required-labor-hours-by-line-shift
    stream_type: STREAMS
    source: SAP S/4HANA
  - stream_name: workforce-master-time-bookings-availability-scheduled-hours-ot-limits
    stream_type: STREAMS
    source: SAP S/4HANA / Time & Attendance System
  - stream_name: training-completion-eligibility
    stream_type: Event Stream
    source: Learning Management System (LMS)
  - stream_name: contingent-worker-availability-rates
    stream_type: DDM/Crawlers
    source: Contingent Staffing Vendor Portal
  - stream_name: labor-cost-rules-overtime-policies
    stream_type: STREAMS
    source: SAP S/4HANA
processing:
  - component: Cortex Auto Forecast
    type: cortex
    function: Predict per-line/shift labor demand and identify upcoming gaps
  - component: Agent Team
    type: process_builder
    function: >-
      Generate prioritized staffing plan balancing cost, certifications, and
      OTIF
  - component: Process Builder + Remote Functions
    type: process_builder
    function: Execute schedule updates in SAP S/4HANA and send contingent requisitions
  - component: CWB Lifecycle
    type: process_builder
    function: Human-in-the-loop approval for high-cost or high-risk staffing changes
ui_surface:
  - component: UI Screen (dashboard)
    screen: Primary
    purpose: Provide visibility into labor plan, cost impact, and OTIF risk
