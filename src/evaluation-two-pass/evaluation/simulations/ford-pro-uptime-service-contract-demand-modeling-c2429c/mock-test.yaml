decision: >-
  Determine SKU-level service part demand for Ford Pro commercial vehicles and
  allocate replenishment quantities and timing across the service-parts network,
  applying recall priorities and lifecycle-driven adjustments for EV components.
input:
  financial_context:
    annual_revenue: 184992000001
    cogs: 158434000000
    ebitda: 12786000000
    inventory_value: 14951000000
  trigger: >-
    Scheduled daily pipeline + event-driven triggers (recall/campaign
    announcement, telematics uptime alerts, major sales/returns batch).
  parameters:
    objective: >-
      Unify six service-parts demand processes into a single end-to-end decision
      engine that produces precise SKU-level forecasts, continuously aligns
      inventory and procurement with demand signals (including recalls and EV
      lifecycle effects), and minimizes excess/obsolete parts while improving
      on-time availability and COGS efficiency for Ford Pro service parts.
    key_inputs:
      - Parts master & BOM
      - Historical parts sales & returns
      - Ford Pro uptime & service contract telemetry
      - Inventory & on-hand / inbound
      - Recall / campaign schedule and priority
      - EV component lifecycle & obsolescence plan
    source_systems:
      - SAP S/4HANA
      - Ford Pro Telematics / Uptime
      - PLM / Engineering (EV lifecycle)
      - Field Service / Recall Management
expected_output:
  action: >-
    Automatically ingest and transform inventory, sales, telemetry, and campaign
    data; generate SKU-level forecasts and safety-stock-adjusted replenishment
    recommendations; write replenishment orders to SAP S/4HANA and surface
    prioritized exceptions to planners for CWB review.
  outcome: >-
    Reduced working capital and obsolete inventory, improved on-time
    availability for service parts, more efficient COGS through targeted
    replenishment and recall handling, and lifecycle-aware planning for EV
    components.
  affected_components:
    - DDM/Crawlers + STREAMS
    - Cortex Auto Forecast
    - Process Builder (Rules, IF, Transaction) + Safety Stock Service
    - Remote Functions (SAP S/4HANA writeback) + Process Builder (Notification)
    - CWB Lifecycle + UI Screens
    - Process Builder (Notification) + Subject Areas (report)
    - Dashboard
rationale: >-
  Consolidating multiple parts-demand processes into a deterministic
  process-driven engine enables repeatable, auditable decisions that combine
  statistical forecasts with rule-based business policies (recalls, lifecycle,
  warranty) to reduce excess stock and improve service levels for Ford Pro.
