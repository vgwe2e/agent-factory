source_systems:
  - name: SAP S/4HANA
    type: ERP
    status: identified
  - name: Promotions Management System
    status: tbd
  - name: Distributor Portal / Partner Systems
    status: tbd
  - name: Finance DW / GL
    status: tbd
aera_ingestion:
  - stream_name: channel-price-lists-catalogs
    stream_type: STREAMS
    source: SAP S/4HANA
  - stream_name: sales-orders-shipments
    stream_type: STREAMS
    source: SAP S/4HANA
  - stream_name: rebate-agreements-accrual-rules
    stream_type: STREAMS
    source: SAP S/4HANA
  - stream_name: inventory-levels-allocation-rules
    stream_type: STREAMS
    source: SAP S/4HANA
  - stream_name: promotions-calendar-tactic-inputs
    stream_type: Event Stream
    source: Promotions Management System
  - stream_name: demand-forecast-elasticity-signals
    stream_type: Event Stream
    source: Cortex Auto Forecast
  - stream_name: financial-targets-ebitda-rules
    stream_type: Event Stream
    source: Finance DW / Finance Policy
processing:
  - component: Cortex Auto Forecast
    type: cortex
    function: >-
      Estimate demand uplift, elasticity, and confidence for promotional
      scenarios
  - component: Process Builder - Rules
    type: process_builder
    function: >-
      Translate financial targets and policies into executable
      pricing/rebate/allocation decisions
  - component: Remote Functions + Process Builder Transaction
    type: process_builder
    function: Enforce decisions in source ERP and create an auditable change record
  - component: CWB Lifecycle
    type: process_builder
    function: >-
      Enable human-in-the-loop approval, override, or escalation for flagged
      cases
ui_surface:
  - component: Dashboard
    screen: Primary
    purpose: >-
      Review automatically coordinate pricing, rebate accruals, and inventory
      allocation across direct, distributor, and retail channels to minimize
      channel-driven margin erosion and protect ebitda while maintaining
      competitive channel pricing in the automotive ecosystem. and approve the
      recommended action.
