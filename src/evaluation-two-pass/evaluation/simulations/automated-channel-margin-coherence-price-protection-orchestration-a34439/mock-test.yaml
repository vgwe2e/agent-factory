decision: >-
  Dynamically determine and enforce a unified channel price, rebate accrual, and
  stock-allocation policy across Direct, Distributor, and Retail
  channels—adjusting promotional depth, rebate eligibility, and allocation
  priorities to maximize EBITDA and comply with channel contractual rules.
input:
  financial_context:
    annual_revenue: 184992000001
    cogs: 158434000000
    ebitda: 12786000000
    inventory_value: 14951000000
  trigger: >-
    Scheduled daily orchestration or real-time event: new promotion/price
    change, rebate update, or inventory threshold breach detected for
    channel-relevant SKUs.
  parameters:
    objective: >-
      Automatically coordinate pricing, rebate accruals, and inventory
      allocation across Direct, Distributor, and Retail channels to minimize
      channel-driven margin erosion and protect EBITDA while maintaining
      competitive channel pricing in the automotive ecosystem.
    key_inputs:
      - Channel Price Lists & Catalogs
      - Sales Orders & Shipments
      - Rebate Agreements & Accrual Rules
      - Inventory Levels & Allocation Rules
      - Promotions Calendar & Tactic Inputs
      - Demand Forecast & Elasticity Signals
      - Financial Targets / EBITDA Rules
    source_systems:
      - SAP S/4HANA
      - Promotions Management System
      - Distributor Portal / Partner Systems
      - Finance DW / GL
expected_output:
  action: >-
    Aggregate ERP pricing, sales, rebate, and inventory data; compute demand and
    promo impact; apply deterministic business rules to set unified channel
    price/rebate/allocation; write approved updates back to SAP S/4HANA via
    Remote Functions; surface exceptions via CWB Lifecycle for manual approval.
  outcome: >-
    Coordinated channel pricing and rebate accruals, reduced margin erosion from
    channel conflicts, prioritized inventory allocation aligned to EBITDA
    impact, auditable writebacks to SAP S/4HANA, and a manageable exceptions
    queue for finance and commercial owners.
  affected_components:
    - STREAMS
    - Cortex Auto Forecast
    - Process Builder - Rules
    - Remote Functions + Process Builder Transaction
    - CWB Lifecycle
    - Dashboard
rationale: >-
  Deterministic, rule-based orchestration using Process Builder ensures
  consistent enforcement of commercial and financial policies across channels.
  Integrating SAP S/4HANA as the source of truth plus Cortex forecasts for
  demand signals enables aligned pricing, rebate accruals, and allocation
  decisions that protect margins without manual, error-prone coordination.
