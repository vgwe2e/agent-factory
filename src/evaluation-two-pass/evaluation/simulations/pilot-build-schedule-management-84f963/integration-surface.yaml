processing:
  - component: Remote Functions
    type: cortex
    function: >-
      Compute optimal pilot run timing and resource assignments respecting
      constraints and cost tradeoffs.
  - component: Process Builder (IF / Rules) + CWB Lifecycle
    type: process_builder
    function: Apply guardrails and route exceptions for decisioning or override.
  - component: Remote Functions + Notification + UI Screen
    type: process_builder
    function: >-
      Execute plan via ERP writeback and inform execution teams; provide
      visibility for pilot execution.
ui_surface:
  - component: Dashboard
    screen: Primary
    purpose: >-
      Review autonomously plan and coordinate pilot builds and related npi
      production activities (pre-production, ramp-up, supplier readiness, pilot
      builds, end-of-life) to minimize time-to-market and cogs while improving
      otif and working capital during npi cycles. and approve the recommended
      action.
