processing:
  - component: Process (Process Builder) + Remote Functions (optimizer)
    type: cortex
    function: Produce feasible, capacity- and changeover-aware schedules
  - component: CWB Lifecycle + Process IF (Rules)
    type: process_builder
    function: Gate final release and surface exceptions for human-in-the-loop
  - component: Process Transaction node + Remote Functions
    type: process_builder
    function: Execute schedule release into enterprise systems and downstream execution
ui_surface:
  - component: UI Screens (dashboard) + Notification (Process Builder)
    screen: Primary
    purpose: >-
      Provide visibility, enable manual adjustments, and close the communication
      loop
