decision: >-
  Should the production line start or stop based on current constraints,
  downtime risks, and demand signals, balancing cost of idling against missed
  throughput
input:
  financial_context:
    annual_revenue: 184992000001
    cogs: 158434000000
    ebitda: 12786000000
    inventory_value: 14951000000
  trigger: >-
    Demand surge detected for Product X, with 10% increase in orders for next 24
    hours
  parameters: {}
expected_output:
  action: start
  outcome: >-
    Production line started to meet 10% demand surge, avoiding $50,682,740 in
    potential lost revenue (10% of daily revenue) and maintaining OTIF
rationale: >-
  The 10% demand surge (10% of daily revenue = $50,682,740) exceeds the cost of
  idling (derived from COGS: $158,434,000,000 annual COGS ≈ $434,065,753 daily
  COGS, with idling cost < 10% of daily COGS). Low downtime risk and sufficient
  inventory (14.95B) confirm start is optimal to avoid missed throughput.
