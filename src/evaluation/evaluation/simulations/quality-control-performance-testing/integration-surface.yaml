source_systems:
  - name: SAP S/4HANA
    status: identified
aera_ingestion:
  - stream_name: in_process_quality_checks
    stream_type: Event Stream
    source: SAP S/4HANA
  - stream_name: engine_dyno_test_results
    stream_type: Event Stream
    source: SAP S/4HANA
  - stream_name: transmission_test_results
    stream_type: Event Stream
    source: SAP S/4HANA
  - stream_name: non_conforming_disposition
    stream_type: Event Stream
    source: SAP S/4HANA
  - stream_name: root_cause_analysis
    stream_type: Reference Stream
    source: SAP S/4HANA
processing:
  - component: test_sequencing_optimizer
    type: Deterministic Optimizer
    function: Optimize test sequencing based on quality data and production constraints
  - component: non_conformity_handler
    type: Agentic Coordinator
    function: Coordinate non-conforming product disposition and rework authorization
  - component: root_cause_rework_trigger
    type: Agentic Coordinator
    function: Trigger rework based on root cause analysis
ui_surface:
  - component: inspection_dashboard
    screen: Quality Dashboard
    purpose: Monitor real-time in-process quality checks and inspections
  - component: dyno_test_dashboard
    screen: Test Results Dashboard
    purpose: View engine dyno and hot test procedure outcomes
  - component: transmission_test_dashboard
    screen: Test Results Dashboard
    purpose: View transmission shift and functionality test results
  - component: disposition_authorization_screen
    screen: Disposition & Rework
    purpose: Approve non-conforming product disposition and rework authorization
  - component: root_cause_analysis_screen
    screen: Root Cause Analysis
    purpose: Analyze quality issues and initiate root-cause-triggered rework
