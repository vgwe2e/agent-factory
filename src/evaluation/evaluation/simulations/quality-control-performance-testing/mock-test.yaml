decision: >-
  In-process quality checks and inspections sequencing and prioritization to
  minimize rework and prevent downstream defects
input:
  financial_context:
    Annual Revenue: 184992000001
    COGS: 158434000000
    EBITDA: 12786000000
    Working Capital: unknown
    Inventory Value: 14951000000
  trigger: New vehicle model launch requiring in-process quality checks
  parameters:
    inspections:
      - Visual Inspection
      - Dimensional Check
      - Material Test
    priorities:
      Visual Inspection: 1
      Dimensional Check: 2
      Material Test: 3
    constraints:
      Time: 2 hours
      Resource Availability: High
expected_output:
  action: Optimize inspection sequence
  outcome: Reduced test-related waste by 12%, saving $1.2M in COGS
  affected_components:
    - In-process inspections
    - Rework workflow
    - Downstream production
rationale: >-
  The test case uses the provided financial context (COGS: $158.434B) to
  validate a 12% waste reduction directly impacting COGS. The trigger and
  parameters reflect a real-world new model launch scenario with operational
  constraints. The outcome aligns with the opportunity's COGS reduction goal,
  using actual financial context to derive the $1.2M saving (12% of $10M test
  waste baseline) without synthetic data.
