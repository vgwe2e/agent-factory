source_systems:
  - name: S4 (SAP S/4HANA)
    type: ERP
    status: identified
  - name: Kinaxis RapidResponse
    type: APS
    status: identified
  - name: Kinaxis (Rebalancing / Shortage / Expediting)
    type: APS
    status: identified
  - name: Blue Yonder WMS
    type: WMS
    status: identified
  - name: Uber Freight (TMS / 3PL)
    type: TMS/3PL
    status: identified
  - name: SAS (Advanced Statistical Forecasting)
    type: Forecasting
    status: identified
aera_ingestion:
  - stream_name: regional-demand-forecasts-per-sku-per-dc
    stream_type: Event Stream
    source: SAS / Kinaxis RapidResponse
  - stream_name: inventory-on-hand-available-per-sku-per-dc
    stream_type: Event Stream
    source: S4 / Blue Yonder WMS
  - stream_name: open-orders-allocations-and-safety-stock-targets
    stream_type: Event Stream
    source: S4 / Kinaxis (FG Safety Stock Modeling)
  - stream_name: transfer-lead-times-transit-cost-and-capacity
    stream_type: Event Stream
    source: Uber Freight TMS / S4 / Kinaxis
  - stream_name: dc-capacity-storage-constraints
    stream_type: Event Stream
    source: S4 / Blue Yonder WMS
  - stream_name: business-rules-and-thresholds-imbalance-min-transfer-qty-cost-vs-benefit
    stream_type: Event Stream
    source: Planning policy configuration (Aera Process Builder / Admin)
  - stream_name: shortage-propagation-planning-consumption
    stream_type: Event Stream
    source: Kinaxis RapidResponse
processing:
  - component: Process Builder (Rules + Data View)
    type: cortex
    function: >-
      Apply deterministic rules to detect regional imbalance and generate
      prioritized SKU/DC transfer candidates
  - component: Process Builder (Remote Functions)
    type: process_builder
    function: >-
      Calculate transfer quantity considering safety stock, lead times,
      transport cost and DC capacity; decide auto-execute vs escalate
  - component: Remote Functions
    type: process_builder
    function: >-
      Create transfer orders in S4, update Blue Yonder WMS and book carrier
      capacity via Uber Freight APIs
  - component: Process Builder (Notification) + UI Screen / Dashboard
    type: process_builder
    function: >-
      Notify planners and operations of executed transfers and surface a summary
      in planner dashboard and Subject Areas
ui_surface:
  - component: Dashboard
    screen: Primary
    purpose: >-
      Review automatically detect regional demand mismatches and orchestrate
      cross-region inventory repositioning to align supply with regional demand
      signals, reducing emergency transfers and regional cogs while improving
      service levels. and approve the recommended action.
