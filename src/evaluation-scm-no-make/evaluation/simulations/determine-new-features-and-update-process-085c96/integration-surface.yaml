    status: identified
  - name: Kinaxis
    type: APS
    status: identified
  - name: Blue Yonder WMS
    type: WMS
    status: identified
  - name: Uber Freight (TMS / 3PL)
    type: TMS/3PL
    status: identified
  - name: SAS / Advanced Statistical Forecasting
    type: Statistical Tool
    status: identified
  - name: Enterprise Data Lake
    type: Data Lake
    status: tbd
  - name: Retail POS / External Demand Feeds
    status: tbd
aera_ingestion:
  - stream_name: sales-history-transactional
    stream_type: batch
    source: S4 (ERP)
  - stream_name: on-hand-inventory-wms-transactions
    stream_type: batch
    source: Blue Yonder WMS / S4
  - stream_name: promotions-pricing-and-markdowns
    stream_type: batch
    source: S4 / Promotional feeds
  - stream_name: cogs-and-product-master-lifecycle-category
    stream_type: batch
    source: S4
  - stream_name: shipment-tms-events-lead-times
    stream_type: API
    source: Uber Freight
  - stream_name: shortage-constraint-signals
    stream_type: batch
    source: Kinaxis RapidResponse
  - stream_name: external-demand-signals-search-weather-events
    stream_type: API
    source: DDM/Crawlers
  - stream_name: reference-historical-forecasts-sas-outputs
    stream_type: batch
    source: SAS / Advanced Statistical Forecasting
processing:
  - component: Data Quality & Validation
    type: cortex
    function: >-
      Detect gaps/outliers, enforce referential integrity and measure signal
      availability
  - component: Cortex Auto Forecast
    type: cortex
    function: >-
      Produce demand, revenue-impact and uncertainty forecasts and quantify
      feature importance
  - component: Process Builder
    type: process_builder
    function: >-
      Enable human-in-the-loop review, approve/override or auto-approve based on
      rules and metrics
  - component: Remote Functions
    type: process_builder
    function: >-
      Apply changes to planning systems and update replenishment/safety stock
      targets
  - component: UI Screens
    type: process_builder
    function: >-
      Provide transparency, KPI tracking (MAPE, stockouts, revenue delta) and
      enable follow-up actions
ui_surface:
  - component: Dashboard
    screen: Primary
    purpose: >-
      Review unify demand forecasting, autonomous data validation, feature
      enrichment (cogs & lifecycle), and forecast-driven inventory & revenue
      optimization across multi-sku, multi-location cpg network to improve
      forecast accuracy, reduce stockouts/waste, and protect revenue. and
      approve the recommended action.
