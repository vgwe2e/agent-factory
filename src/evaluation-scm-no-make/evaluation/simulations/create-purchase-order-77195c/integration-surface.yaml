source_systems:
  - name: S4 (SAP S/4HANA)
    type: ERP
    status: identified
  - name: SAS
    type: Analytics
    status: identified
  - name: Kinaxis RapidResponse
    type: Planning
    status: identified
  - name: Blue Yonder WMS
    type: WMS
    status: identified
  - name: Uber Freight TMS
    type: TMS
    status: identified
  - name: 3PL Uber Freight
    type: 3PL
    status: identified
  - name: Contract Repository
    status: tbd
  - name: Supplier Portal / Catalog
    status: tbd
aera_ingestion:
  - stream_name: purchase-procurement-request
    stream_type: Report Data
    source: S4 (procurement module) or Supplier Portal
  - stream_name: material-master-prices-uom-lead-times
    stream_type: Data View
    source: S4
  - stream_name: forecasted-demand-recommended-qty
    stream_type: Report Data
    source: SAS / Advanced Statistical Forecasting in SAS
  - stream_name: inventory-on-hand-reserved
    stream_type: Event Stream
    source: Blue Yonder WMS / S4
  - stream_name: available-to-promise-atp-supply-constraints
    stream_type: Event Stream
    source: S4 / Kinaxis RapidResponse
  - stream_name: supplier-contracts-approved-terms
    stream_type: Event Stream
    source: Contract Repository / S4
  - stream_name: budget-financial-approval-limits
    stream_type: Event Stream
    source: S4 (FI) / Finance system
  - stream_name: supplier-performance-qualification
    stream_type: Event Stream
    source: Kinaxis / Supplier Portal
processing:
  - component: Process Builder
    type: process_builder
    function: >-
      Run deterministic rules (budget limits, contract compliance, lead-time
      risk) and branch to auto-issue or CWB approval.
  - component: Remote Functions
    type: process_builder
    function: >-
      Write PO with legal/commercial terms into S4 and record financial
      commitment.
  - component: Notification
    type: process_builder
    function: >-
      Alert procurement, requester and supplier; update Subject Areas for
      reporting.
ui_surface:
  - component: Dashboard
    screen: Primary
    purpose: >-
      Review automatically create purchase orders in s4 for approved
      material/service requests while balancing cost, lead-time risk, and
      contract compliance. and approve the recommended action.
