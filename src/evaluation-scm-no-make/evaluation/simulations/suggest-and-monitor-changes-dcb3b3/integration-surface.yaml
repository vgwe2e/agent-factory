processing:
  - component: Cortex Auto Forecast + RCA Service
    type: cortex
    function: >-
      Produce recommended requirement, safety stock, and rebalancing actions
      with confidence and impact estimates
  - component: Remote Functions + Process Builder (Action Item)
    type: process_builder
    function: >-
      Write adjustments to S4/Kinaxis and signal 3PL/TMS for transport or
      fulfillment changes
  - component: CWB Lifecycle + Notification + UI Screen
    type: process_builder
    function: >-
      Ensure audit trail, stakeholder visibility, and measure change impact
      (waste, COGS, service levels)
  - component: Process Builder (IF, Rules) + Agent Team
    type: agent_teams
    function: >-
      Apply governance: auto-execute high-confidence, create CWB for approvals
      for others
ui_surface:
  - component: Dashboard
    screen: Primary
    purpose: >-
      Review automate end-to-end data orchestration for sku x location across
      hershey to harmonize forecasts, inventory, and supplier requirements so
      autonomous recommendations and actions reduce waste, improve cogs, and
      protect revenue during promotional and demand variability. and approve the
      recommended action.
