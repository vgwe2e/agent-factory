decision: >-
  Select sourcing opportunities (items/commodities) for consolidation or
  re-sourcing by evaluating should-cost breakdown, supplier capability, contract
  coverage, service metrics, and supplier risk, then generate an executable
  sourcing profile and action plan.
input:
  financial_context:
    annual_revenue: 11202000000
    cogs: 5901000000
    ebitda: 3353000000
    inventory_value: 1254000000
  trigger: >-
    Periodic cost-structure review or scheduled category review
    (monthly/quarterly) that flags material/commodity items with high COGS
    contribution, fragmented supplier base, or low contract coverage.
  parameters:
    objective: >-
      Reduce COGS and improve contract compliance and supplier resilience by
      identifying and executing high-impact sourcing consolidation and
      optimization opportunities across L4 sourcing processes using
      deterministic optimization and semi-autonomous agents.
    key_inputs:
      - Item/commodity cost breakdown (materials, labor, overhead, SG&A, margin)
      - Supplier master and performance metrics (OTIF, quality, capacity)
      - Contract coverage and commercial terms
      - Demand forecasts and usage patterns
      - Inventory positions & lead times
      - Supplier risk indicators (financial, geopolitical, capacity alerts)
    source_systems:
      - S4 (SAP S/4HANA)
      - SAS
      - Kinaxis RapidResponse
      - Kinaxis (general)
      - Blue Yonder WMS
      - Uber Freight (TMS/3PL)
      - Contract Repository / CLM
      - Supplier Portal / Performance DB
expected_output:
  action: >-
    Ingest supplier, contract, cost, demand and inventory signals; compute
    should-cost and consolidation ROI; prioritize opportunities; create sourcing
    profiles (target suppliers, lot-sizes, terms); execute sourcing events and
    ERP contract/PO updates; monitor supplier performance and risk.
  outcome: >-
    Measurable COGS reduction for targeted categories, increased
    contract-covered spend, fewer suppliers per commodity where appropriate, and
    improved supplier resilience (reduced risk scores and faster mitigation
    actions).
  affected_components:
    - DDM/Crawlers
    - STREAMS
    - Process (Process Builder) + Rules
    - Action Item + Remote Functions
    - Notification + UI Screen
    - Dashboard
rationale: >-
  Combining deterministic cost-modeling (should-cost), rule-based prioritization
  and Process Builder orchestration enables consistent, scalable identification
  and execution of sourcing opportunities. Integration with ERP and planning
  systems ensures executable plans and closed-loop monitoring to capture savings
  and maintain resilience.
