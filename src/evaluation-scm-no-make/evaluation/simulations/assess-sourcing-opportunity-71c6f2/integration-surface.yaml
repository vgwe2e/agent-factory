source_systems:
  - name: S4 (SAP S/4HANA)
    type: ERP
    status: identified
  - name: SAS
    type: Analytics
    status: identified
  - name: Kinaxis RapidResponse
    type: APS
    status: identified
  - name: Kinaxis (general)
    type: APS
    status: identified
  - name: Blue Yonder WMS
    type: WMS
    status: identified
  - name: Uber Freight (TMS/3PL)
    type: TMS/3PL
    status: identified
  - name: Contract Repository / CLM
    status: tbd
  - name: Supplier Portal / Performance DB
    status: tbd
aera_ingestion:
  - stream_name: item-commodity-cost-breakdown-materials-labor-overhead-sg-a-margin
    stream_type: STREAMS
    source: S4 (costing tables) + SAS should-cost outputs
  - stream_name: supplier-master-and-performance-metrics-otif-quality-capacity
    stream_type: Subject Areas
    source: S4 + Supplier Portal / Performance DB
  - stream_name: contract-coverage-and-commercial-terms
    stream_type: DDM/Crawlers
    source: Contract Repository / CLM
  - stream_name: demand-forecasts-and-usage-patterns
    stream_type: Subject Areas
    source: Kinaxis RapidResponse / Advanced Statistical Forecasting in SAS
  - stream_name: inventory-positions-lead-times
    stream_type: STREAMS
    source: Blue Yonder WMS + Kinaxis
  - stream_name: supplier-risk-indicators-financial-geopolitical-capacity-alerts
    stream_type: Event Stream
    source: External risk feeds + Supplier Portal
processing:
  - component: Process (Process Builder) + Rules
    type: process_builder
    function: >-
      Select items for consolidation/resourcing and create target supplier/terms
      profile
  - component: Action Item + Remote Functions
    type: process_builder
    function: >-
      Kick off negotiation events, writeback contract/PO updates to S4, and
      capture execution tasks
  - component: Notification + UI Screen
    type: process_builder
    function: >-
      Communicate plan, get approvals if required, and provide transparency for
      tracking
ui_surface:
  - component: Dashboard
    screen: Primary
    purpose: >-
      Review reduce cogs and improve contract compliance and supplier resilience
      by identifying and executing high-impact sourcing consolidation and
      optimization opportunities across l4 sourcing processes using
      deterministic optimization and semi-autonomous agents. and approve the
      recommended action.
