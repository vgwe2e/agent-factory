source_systems:
  - name: S4 (SAP S/4HANA)
    type: ERP
    status: identified
  - name: Kinaxis RapidResponse
    type: APS
    status: identified
  - name: Kinaxis (Order Expediting / Rebalancing / FG Safety Stock)
    type: APS
    status: identified
  - name: SAS (Advanced Statistical Forecasting)
    type: Advanced Analytics
    status: identified
  - name: Blue Yonder WMS
    type: WMS
    status: identified
  - name: Uber Freight TMS
    type: TMS
    status: identified
  - name: 3PL Uber Freight
    type: Logistics Provider
    status: identified
aera_ingestion:
  - stream_name: inventory-on-hand-location-balances
    stream_type: scheduled_batch
    source: S4 / Blue Yonder WMS
  - stream_name: forecasts-and-forecast-error-bias
    stream_type: scheduled_batch
    source: SAS / Kinaxis RapidResponse
  - stream_name: supplier-risk-lead-time-volatility
    stream_type: scheduled_batch
    source: S4 + Kinaxis + procurement feeds
  - stream_name: promotion-pricing-and-uplift-plans
    stream_type: scheduled_batch
    source: S4 / Promotion Planning
  - stream_name: open-pos-inbound-arrivals-and-transit-status
    stream_type: scheduled_batch
    source: S4 / Uber Freight TMS / 3PL Uber Freight
  - stream_name: historical-write-offs-adjustment-history
    stream_type: scheduled_batch
    source: S4 / Finance reports
  - stream_name: working-capital-kpis-dso-dpo-inventory-days
    stream_type: scheduled_batch
    source: Finance (S4 / reporting)
processing:
  - component: Cortex RCA Service + Data Science
    type: cortex
    function: >-
      Classify risks (write-off, supplier, promotion) and surface feature impact
      for each SKU/location
  - component: Remote Functions + Process Builder Action Item
    type: process_builder
    function: >-
      Implement recommended changes (cancel/expedite/reprice/reallocate) and
      record audit trail
  - component: CWB Lifecycle + UI Screen + Notification
    type: process_builder
    function: >-
      Enable human-in-the-loop approvals for high-impact or low-confidence cases
      and capture decisions for learning
  - component: Process Builder (IF + Rules) + Agent Team
    type: agent_teams
    function: >-
      Select mitigation path balancing detection sensitivity vs. workload and
      WCM/EBITDA impact
ui_surface:
  - component: Dashboard
    screen: Primary
    purpose: >-
      Review automate unified risk segmentation, assessment, and proactive
      mitigation across inventory, supplier, and promotion risks to protect
      working capital and ebitda across sku/location matrices. and approve the
      recommended action.
