source_systems:
  - name: S4 (SAP S/4HANA)
    type: ERP
    status: identified
  - name: Kinaxis RapidResponse
    type: APS/planning
    status: identified
  - name: Kinaxis (FG Safety Stock Modeling / Rebalancing / Order Expediting)
    type: planning_services
    status: identified
  - name: SAS (Advanced Statistical Forecasting)
    type: forecasting
    status: identified
  - name: Blue Yonder WMS
    type: WMS
    status: identified
  - name: Uber Freight (TMS / 3PL integrations)
    type: TMS/3PL
    status: identified
aera_ingestion:
  - stream_name: sales-history-shipments-sku-x-location-x-time
    stream_type: scheduled_batch
    source: S4 / SAS
  - stream_name: sku-master-product-attributes
    stream_type: scheduled_batch
    source: S4
  - stream_name: location-master-dc-attributes-capacity-service-tier
    stream_type: scheduled_batch
    source: S4 / Kinaxis
  - stream_name: inventory-on-hand-and-available-to-promise
    stream_type: scheduled_batch
    source: Blue Yonder WMS / S4
  - stream_name: segmentation-rule-set-thresholds-attribute-weights
    stream_type: Event Stream
    source: Process Builder configuration / business input
  - stream_name: capacity-production-constraints
    stream_type: api
    source: Kinaxis RapidResponse
  - stream_name: safety-stock-and-replenishment-policy-outputs
    stream_type: scheduled_batch
    source: Kinaxis FG Safety Stock Modeling
  - stream_name: transport-capacity-and-sla-inputs
    stream_type: api
    source: Uber Freight TMS
processing:
  - component: Process Builder (Rules node)
    type: cortex
    function: >-
      Run ABC/XYZ-style rule engine using configured thresholds and attribute
      weights to produce segments
  - component: Process Builder (IF + Remote Functions)
    type: process_builder
    function: >-
      Apply allocation logic and invoke Remote Functions for complex
      calculations or revenue-weighted allocation
  - component: >-
      Remote Functions (ERP writeback) -> S4, Kinaxis updates, WMS/TMS
      notifications
    type: process_builder
    function: >-
      Perform transactional updates to S4 and Kinaxis and push pick/ship
      instructions to WMS/TMS with rollback tokens
ui_surface:
  - component: UI Screen (dashboard) + CWB Lifecycle snapshot / Action Item
    screen: Primary
    purpose: >-
      Show allocation outcomes, KPIs, exceptions and allow one-click rollback or
      human review via Action Item/CWB
