  - stream_name: supplier-risk-scores-prequalification-data
    stream_type: DDM/Crawlers
    source: Supplier Risk & Prequalification Platform
  - stream_name: active-contracts-terms-pricing-volume-discounts-payment-po-timing
    stream_type: Event Stream
    source: Contract Management System
  - stream_name: category-profiles-sourcing-playbooks
    stream_type: Event Stream
    source: Procurement Portal / Catalog
  - stream_name: market-pricing-benchmark-data
    stream_type: DDM/Crawlers
    source: Market Pricing / Benchmarking API
