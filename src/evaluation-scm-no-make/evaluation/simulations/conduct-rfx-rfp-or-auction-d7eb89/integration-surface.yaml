    stream_type: STREAMS
    source: Kinaxis / Blue Yonder WMS
processing:
  - component: Cortex RCA Service + Cortex Auto Forecast
    type: cortex
    function: >-
      Produce prioritized sourcing opportunities with risk-adjusted demand and
      contract constraints.
  - component: Process Builder (Transaction + Remote Functions)
    type: process_builder
    function: >-
      Execute sourcing paperwork, validate contractual reuse, and plan ERP
      writeback for award/PO timing.
  - component: CWB Lifecycle
    type: process_builder
    function: >-
      Allow procurement to accept, reject, or override agent recommendations
      with audit trail.
  - component: UI Screen + Notification
    type: process_builder
    function: >-
      Communicate decisions, timelines, and financial impact to procurement,
      finance, and supply planning.
  - component: Agent Team (agentic_ai) orchestrated by Process Builder
    type: agent_teams
    function: >-
      Select RFx / RFP / Auction / Direct negotiation based on multi-criteria
      optimization and guardrails.
ui_surface:
  - component: Dashboard
    screen: Primary
    purpose: >-
      Review automate end-to-end sourcing decisions—sourcing approach selection,
      supplier prequalification, rfx execution, contract-aware negotiations, and
      implementation planning—to minimize cogs, protect margins, and optimize
      working capital while reducing cycle time and improving supplier
      resilience. and approve the recommended action.
