source_systems:
  - name: S4 (SAP S/4HANA)
    type: ERP
    status: identified
  - name: SAS
    type: Advanced forecasting / promotions
    status: identified
  - name: Kinaxis RapidResponse
    type: APS / supply planning
    status: identified
  - name: Blue Yonder WMS
    type: WMS
    status: identified
  - name: Uber Freight (TMS / 3PL)
    type: TMS / 3PL
    status: identified
  - name: Aera STREAMS (Data Foundation)
    type: ETL
    status: tbd
  - name: Cortex Auto Forecast / Monitoring
    type: AI/ML & monitoring
    status: tbd
  - name: Process Builder
    type: Orchestration
    status: tbd
aera_ingestion:
  - stream_name: sku-master-attributes-lifecycle-product-family
    stream_type: Report Data
    source: S4 (product master)
  - stream_name: location-master-site-attributes-capacities
    stream_type: Report Data
    source: S4 / Kinaxis
  - stream_name: sales-history-and-demand-signals-pos-shipments
    stream_type: Stream
    source: S4 / SAS
  - stream_name: promotions-calendar-and-planned-events
    stream_type: Report Data
    source: SAS
  - stream_name: on-hand-inventory-and-wms-locations
    stream_type: Stream
    source: Blue Yonder WMS
  - stream_name: supply-constraints-and-production-capacity
    stream_type: Report Data
    source: Kinaxis RapidResponse / S4
processing:
  - component: Process Builder (IF/Rules) + CWB Lifecycle (recommendation view)
    type: process_builder
    function: >-
      Automatically accept high-confidence segments; route low-confidence
      exceptions.
  - component: Process Builder (Transaction) + Remote Functions
    type: process_builder
    function: >-
      Apply segment-driven production/replenishment and inventory rebalancing
      across systems.
  - component: Cortex Monitoring + Process Builder (Rollback Transaction) + UI Screen
    type: process_builder
    function: >-
      Confirm allocations applied correctly and provide a rapid revert path if
      anomalies detected.
ui_surface:
  - component: Dashboard
    screen: Primary
    purpose: >-
      Review use deterministic demand segmentation to create sku-location demand
      blocs (abc/xyz), then automatically allocate production and
      inventory/replenishment at the segment level with touchless execution and
      rapid rollback. and approve the recommended action.
