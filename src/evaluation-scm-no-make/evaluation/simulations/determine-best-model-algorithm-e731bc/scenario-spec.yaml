key_inputs:
  - name: Historical sales (SKU-level time series)
    source: S4 / Subject Areas
    purpose: Primary training data for time-series modeling and pattern detection
    preferred_stream_type: time_series
  - name: POS and demand signals (store/region)
    source: S4 / downstream integrations
    purpose: Short-term demand sensing and promotion impact estimation
    preferred_stream_type: time_series
  - name: Promotions & pricing calendar
    source: S4 / Marketing feeds
    purpose: Encode promotion events and pricing shifts for model features
    preferred_stream_type: batch
  - name: Inventory & on-hand levels
    source: Blue Yonder WMS / S4
    purpose: Constraint and service-level impact assessment; safety-stock context
    preferred_stream_type: batch
  - name: Supply status & lead times
    source: Kinaxis RapidResponse / S4
    purpose: >-
      Assess supply constraints and inform parameterization for feasible
      forecasts
    preferred_stream_type: batch
  - name: Macro & market indicators (pricing elasticity, seasonality drivers)
    source: External market feeds / DDM crawlers
    purpose: Augment models for demand shifts and seasonality adjustments
    preferred_stream_type: batch
  - name: Forecast performance metrics (MAPE, bias, service level)
    source: Subject Areas / Cortex Monitoring
    purpose: Compare model fits, monitor drift, and drive selection/tuning
    preferred_stream_type: time_series
  - name: EBITDA targets and margin constraints
    source: Finance (S4 or planning inputs)
    purpose: Parameterize cost/service trade-offs and bias tolerances across SKUs
    preferred_stream_type: batch
happy_path:
  - step: Consolidate market, POS, master and inventory data into Aera Subject Areas
    stage: ingest
    component: STREAMS
    purpose: Aggregate, cleanse and prepare time-series and event features for modeling
  - step: Run automated algorithm selection and baseline forecasts
    stage: analyze
    component: Cortex Auto Forecast
    purpose: >-
      Assess demand patterns, candidate algorithms, and produce baseline metrics
      (MAPE, bias)
  - step: Orchestrate model selection and EBITDA-aligned parameter tuning
    stage: decide
    component: Process Builder (Process, Rules)
    purpose: >-
      Apply rules to balance fit vs complexity and adjust parameters to meet
      EBITDA constraints
  - step: Execute parameter optimization and write final forecasts
    stage: act
    component: Remote Functions
    purpose: >-
      Perform complex calculations, persist tuned parameters to Subject Areas,
      write forecasts/params back to S4 and trigger Kinaxis
  - step: Surface recommendations and exceptions for review
    stage: review
    component: CWB Lifecycle / UI Screens
    purpose: >-
      Present borderline cases for human override, capture decisions, and
      finalize writeback
branches:
  - condition: Model fit (MAPE/bias) fails business threshold for many SKUs
    response: >-
      Process Builder triggers Data Science subprocess to run alternate
      algorithms or feature engineering (Script/Data Science node) and flags
      results; escalate persistent failures to data science team via
      Notification
    outcome: >-
      Fallback models or retrained models deployed; persistent issues routed for
      manual investigation
  - condition: >-
      EBITDA constraint cannot be satisfied without violating service-level
      minima
    response: >-
      Adjust tradeoff weights via Process Rules and surface tradeoff options in
      CWB Lifecycle for finance approval; if rejected, apply predefined
      conservative parameter set
    outcome: >-
      Either approved EBITDA-aligned parameters or conservative defaults to
      protect service levels
  - condition: Critical input data (promotions, POS) is missing or stale
    response: >-
      DDM/Crawlers and STREAMS retry ingestion; if unresolved, tag affected SKUs
      and route to CWB Lifecycle for manual data correction
    outcome: >-
      Either automated ingestion succeeds and loop continues, or affected
      forecasts are held/flagged for human remediation
