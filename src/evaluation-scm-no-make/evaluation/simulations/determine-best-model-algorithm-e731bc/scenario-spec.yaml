objective: >-
  Automate end-to-end top-line demand forecasting with continuous demand
  sensing, automated model selection and parameterization, and EBITDA-aligned
  tuning to reduce stockouts, waste, and promo volatility while improving
  revenue and margin.
trigger: >-
  Daily or event-driven ingest of updated market signals (POS, promotions,
  pricing, macro indicators) or weekly scheduled model-selection cycle.
decision: >-
  Determine Best Model & Algorithm: choose best model type and parameters per
  SKU/group balancing fit quality vs computational complexity (triggered during
  model selection phase).
expected_action: >-
  Automatically evaluate candidate forecasting algorithms, select best-fit model
  per SKU/group, tune parameters to incorporate promotions, seasonality and
  EBITDA constraints, persist parameters and forecasts to Subject Areas, and
  write final forecasts/parameters back to S4 and Kinaxis; surface exceptions
  and borderline cases via CWB Lifecycle for human review.
expected_outcome: >-
  Continuous improvement in forecast accuracy (lower MAPE), fewer stockouts and
  overstocks, reduced promo-driven volatility, faster propagation of demand
  signal into supply plans (Kinaxis), and measurable EBITDA-aligned tradeoffs in
  forecast bias and service levels.
rationale: >-
  A closed-loop process that continuously ingests market signals and automates
  model selection and parameter tuning enables responsive, scalable forecasting.
  Cortex Auto Forecast provides robust algorithm selection; Process Builder
  orchestrates rules and gates; Remote Functions handle complex calculations and
  ERP writebacks; CWB Lifecycle manages exceptions and human overrides—together
  aligning forecasts with EBITDA and operational constraints.
