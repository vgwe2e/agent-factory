  - stream_name: current-safety-stock-parameters-and-policies
    stream_type: STREAMS
    source: Kinaxis (FG safety stock modeling)
  - stream_name: open-pos-supplier-lead-times-and-replenishment-constraints
    stream_type: STREAMS
    source: S4 (SAP) / Kinaxis
  - stream_name: service-level-targets-and-working-capital-thresholds
    stream_type: Event Stream
    source: Finance (via S4) / Planning policy
