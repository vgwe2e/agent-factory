aera_ingestion:
  - stream_name: touchless-demand-forecasts-and-demand-scenarios
    stream_type: STREAMS
    source: SAS (Advanced Statistical Forecasting)
  - stream_name: current-inventory-on-hand-allocated-in-transit
    stream_type: Subject Area
