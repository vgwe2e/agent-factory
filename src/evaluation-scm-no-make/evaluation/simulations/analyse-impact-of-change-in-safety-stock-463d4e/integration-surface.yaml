processing:
  - component: Process Builder (calls Safety Stock Service / Remote Functions)
    type: cortex
    function: Quantify service vs. working-capital trade-offs across SKUs and locations
  - component: CWB Lifecycle
    type: process_builder
    function: Surface recommendations with impact metrics for accept/reject/override
  - component: Process Builder (Remote Functions)
    type: process_builder
    function: Apply low-risk changes automatically and initiate system-level actions
  - component: Notification / Action Item (Process Builder)
    type: process_builder
    function: >-
      Ensure visibility, required approvals, and traceability of decisions and
      system writes
ui_surface:
  - component: Dashboard
    screen: Primary
    purpose: >-
      Review orchestrate integrated demand-supply scenario analyses to generate
      risk-adjusted demand scenarios, run safety stock sensitivity across skus
      and locations, and execute semi-autonomous actions to protect revenue
      while optimizing working capital. and approve the recommended action.
