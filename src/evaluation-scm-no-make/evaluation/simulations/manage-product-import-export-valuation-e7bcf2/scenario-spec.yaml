objective: >-
  Determine and calculate customs duties and landed cost for imported/exported
  products, and integrate duties/taxes into product valuation and downstream
  cost balancing with transport and logistics charges.
trigger: >-
  New shipment record, a tariff/rate change, a new trade agreement, or scheduled
  periodic landed-cost recalculation.
decision: >-
  Select applicable landed-cost components (duties, taxes, fees, tariffs) per
  product/shipment and decide whether to auto-apply calculated valuation updates
  or route for manual approval.
expected_action: >-
  Ingest product, shipment, tariff and transport cost data; compute duties and
  landed cost using deterministic rules; auto-apply when within thresholds or
  create CWB exceptions for finance/commodity review; write approved valuations
  back to S4 and update planning subject areas.
expected_outcome: >-
  Accurate landed cost recorded in product valuation and planning Subject Areas,
  exceptions captured and routed for approval, audit trail of tariff sources and
  computations, and downstream systems updated (ERP/WMS/TMS).
rationale: >-
  Use STREAMS/DDM to consolidate canonical inputs, Remote Functions for
  deterministic tariff and landed-cost calculations, Process Builder + IF nodes
  to evaluate thresholds, and CWB Lifecycle for human-in-the-loop approvals so
  automated updates and auditability are balanced with required controls.
source_systems:
  - name: S4 (SAP S/4HANA)
    type: ERP
    status: identified
  - name: SAS
    type: Analytics
    status: identified
  - name: Advanced Statistical Forecasting in SAS
    type: Forecasting
    status: identified
  - name: Kinaxis RapidResponse
    type: APS
    status: identified
  - name: Kinaxis
    type: APS
    status: identified
  - name: Blue Yonder WMS
    type: WMS
    status: identified
  - name: Uber Freight TMS
    type: TMS
    status: identified
  - name: 3PL Uber Freight
    type: 3PL
    status: identified
  - name: Customs Tariff Database
    status: tbd
  - name: Trade Agreements Repository
    status: tbd
key_inputs:
  - name: Product master (incl. HS codes, weights, valuation class)
    source: S4 (SAP S/4HANA)
    purpose: Map items to tariff classifications and base product valuation
    preferred_stream_type: STREAMS
  - name: Shipment manifest and line-level shipment details
    source: Blue Yonder WMS / Uber Freight TMS / S4
    purpose: >-
      Provide shipment-level quantities, origin/destination, Incoterms and
      transport metadata for cost allocation
    preferred_stream_type: DDM/Crawlers
  - name: Tariff & duty rates (HS-based rates + regional rules)
    source: Customs Tariff Database
    purpose: >-
      Determine duty and tax percentages/rules applicable per HS code / trade
      lane
    preferred_stream_type: DDM/Crawlers
  - name: Trade agreements and preferential rules (eligibility)
    source: Trade Agreements Repository
    purpose: >-
      Apply preferential duty rates and eligibility rules to reduce duties where
      applicable
  - name: Freight, insurance and logistics costs
    source: Uber Freight TMS / 3PL Uber Freight / Blue Yonder WMS
    purpose: Allocate transport/logistics costs into landed cost calculation
    preferred_stream_type: STREAMS
  - name: Historical landed cost and reconciliation records
    source: SAS
    purpose: Benchmark and validate calculated landed costs and support reconciliations
happy_path:
  - step: >-
      Consolidate master, shipment, tariff and freight data into canonical
      landed-cost dataset
    stage: ingest
    component: STREAMS
    purpose: >-
      Create validated, joined dataset for each shipment-line with HS codes,
      trade lane and transport costs
  - step: >-
      Run deterministic landed-cost calculation applying tariff rules and
      trade-agreement logic
    stage: analyze
    component: Remote Functions
    purpose: >-
      Compute duties, taxes, fees and allocate transport costs into per-item
      landed cost
  - step: >-
      Evaluate results against thresholds and policy rules to decide auto-apply
      vs approval
    stage: decide
    component: Process Builder (IF) + CWB Lifecycle
    purpose: >-
      Automatically accept small deltas; create CWB tasks for material/finance
      review when required
  - step: >-
      Apply approved landed-cost updates and write back valuation to ERP and
      planning store
    stage: act
    component: Remote Functions + Subject Areas
    purpose: >-
      Persist approved cost changes to S4 and update Subject Areas for
      downstream planning
  - step: >-
      Surface results, audit trail and exception tasks to finance and trade
      teams
    stage: surface
    component: UI Screen + Notification
    purpose: >-
      Provide review screens, auditability and notifications for reconciliations
      and post-entry review
branches:
  - condition: Missing or invalid HS/tariff classification for one or more items
    response: >-
      Create CWB exception via Process Builder -> UI Screen for manual
      classification; optionally call Agent Team for suggested HS via
      data-science or lookup
    outcome: >-
      HS codes assigned manually, dataset refreshed, and landed-cost
      recalculated
  - condition: >-
      Calculated landed-cost delta exceeds configured approval threshold (policy
      or finance threshold)
    response: >-
      Route to CWB Lifecycle for finance/commodity approval with supporting
      audit trail and source-rate links
    outcome: >-
      Costs held until approved; once approved, Remote Functions write back to
      S4 and Subject Areas; if rejected, revert to prior valuation and create
      reconciliation task
  - condition: Tariff rate source unavailable or inconsistent (data gap)
    response: >-
      Fallback to last-known rates, flag calculations and raise Notification for
      tariff-data reconciliation
    outcome: >-
      Calculations proceed using fallback rates but are flagged for audit and
      remediation; reconciliation tasks created
