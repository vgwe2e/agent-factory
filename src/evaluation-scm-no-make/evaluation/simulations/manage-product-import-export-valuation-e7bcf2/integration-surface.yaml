aera_ingestion:
  - stream_name: product-master-incl-hs-codes-weights-valuation-class
    stream_type: STREAMS
    source: S4 (SAP S/4HANA)
  - stream_name: shipment-manifest-and-line-level-shipment-details
    stream_type: DDM/Crawlers
    source: Blue Yonder WMS / Uber Freight TMS / S4
  - stream_name: tariff-duty-rates-hs-based-rates-regional-rules
    stream_type: DDM/Crawlers
    source: Customs Tariff Database
  - stream_name: trade-agreements-and-preferential-rules-eligibility
    stream_type: Event Stream
    source: Trade Agreements Repository
  - stream_name: freight-insurance-and-logistics-costs
    stream_type: STREAMS
    source: Uber Freight TMS / 3PL Uber Freight / Blue Yonder WMS
  - stream_name: historical-landed-cost-and-reconciliation-records
    stream_type: Event Stream
    source: SAS
processing:
  - component: Remote Functions
    type: cortex
    function: >-
      Compute duties, taxes, fees and allocate transport costs into per-item
      landed cost
  - component: Process Builder (IF) + CWB Lifecycle
    type: process_builder
    function: >-
      Automatically accept small deltas; create CWB tasks for material/finance
      review when required
  - component: Remote Functions + Subject Areas
    type: process_builder
    function: >-
      Persist approved cost changes to S4 and update Subject Areas for
      downstream planning
ui_surface:
  - component: UI Screen + Notification
    screen: Primary
    purpose: >-
      Provide review screens, auditability and notifications for reconciliations
      and post-entry review
