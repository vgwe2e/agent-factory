processing:
  - component: Agent Team
    type: process_builder
    function: Create targeted simulation variants balancing coverage and run cost
  - component: Data Science
    type: process_builder
    function: Quantify exposures, bottlenecks and mitigation effectiveness
  - component: CWB Lifecycle
    type: process_builder
    function: >-
      Enable human approval / override of agent recommendations with
      traceability
  - component: Remote Functions
    type: process_builder
    function: Apply changes in S4 / Kinaxis and trigger transport/3PL actions
  - component: UI Screen
    type: process_builder
    function: Provide transparency, audit trail and next‑run tuning inputs
ui_surface:
  - component: Dashboard
    screen: Primary
    purpose: >-
      Review provide an integrated resilience procurement control tower that
      delivers n‑tier supplier visibility, runs digital‑twin stress tests, and
      aligns continuity and sourcing decisions to protect margins and revenue
      amid input cost volatility and promotional spend. and approve the
      recommended action.
