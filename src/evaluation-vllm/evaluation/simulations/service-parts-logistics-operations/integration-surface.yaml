source_systems:
  - name: SAP S/4HANA
    type: ERP
    status: identified
aera_ingestion:
  - stream_name: parts-orders
    stream_type: Event Stream
    source: SAP S/4HANA
  - stream_name: urgent-requests
    stream_type: Event Stream
    source: SAP S/4HANA
  - stream_name: inventory-levels
    stream_type: Event Stream
    source: SAP S/4HANA
  - stream_name: core-returns
    stream_type: Event Stream
    source: SAP S/4HANA
processing:
  - component: Cortex Auto Forecast
    type: cortex
    function: Predict optimal fulfillment routes and inventory deployment.
  - component: Process Builder
    type: process_builder
    function: >-
      Decide on expedited shipping and cross-DC transfers to minimize costs and
      meet service levels.
  - component: Remote Functions
    type: process_builder
    function: Implement the optimized fulfillment and transfer decisions.
  - component: Cortex Monitoring
    type: process_builder
    function: Ensure continuous improvement and accuracy of logistics decisions.
ui_surface:
  - component: Dashboard
    screen: Primary
    purpose: >-
      Review optimize service parts logistics operations by autonomously
      deciding and executing actions to reduce working capital, prevent
      stockouts, and improve otif. and approve the recommended action.
