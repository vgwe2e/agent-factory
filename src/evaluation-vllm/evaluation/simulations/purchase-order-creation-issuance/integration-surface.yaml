source_systems:
  - name: SAP S/4HANA
    type: ERP
    status: identified
aera_ingestion:
  - stream_name: demand-signals
    stream_type: Event Stream
    source: SAP S/4HANA
  - stream_name: supplier-capacity
    stream_type: Event Stream
    source: SAP S/4HANA
  - stream_name: contract-terms
    stream_type: Event Stream
    source: SAP S/4HANA
processing:
  - component: Cortex Auto Forecast
    type: cortex
    function: Predict optimal supplier and quantity for POs.
  - component: Remote Functions
    type: process_builder
    function: Ensure POs comply with contract terms.
  - component: Process Builder
    type: process_builder
    function: Automate PO issuance process.
  - component: Notification
    type: process_builder
    function: Inform relevant parties about issued POs.
  - component: Agentic AI
    type: agent_teams
    function: Create PO drafts based on analysis.
ui_surface:
  - component: Dashboard
    screen: Primary
    purpose: >-
      Review autonomous drafting, validation, and issuance of various types of
      purchase orders with end-to-end governance. and approve the recommended
      action.
