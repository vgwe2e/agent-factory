source_systems:
  - name: SAP S/4HANA
    type: ERP
    status: identified
aera_ingestion:
  - stream_name: daily-build-sequence
    stream_type: Event Stream
    source: SAP S/4HANA
  - stream_name: production-schedule-changes
    stream_type: Event Stream
    source: SAP S/4HANA
  - stream_name: model-mix-data
    stream_type: Event Stream
    source: SAP S/4HANA
  - stream_name: capacity-data
    stream_type: Event Stream
    source: SAP S/4HANA
processing:
  - component: AutoML
    type: process_builder
    function: To determine the optimal production schedule and model mix.
  - component: Remote Functions
    type: process_builder
    function: To implement the optimized production plan.
  - component: Cortex Monitoring
    type: process_builder
    function: To ensure the plan meets efficiency and on-time delivery targets.
ui_surface:
  - component: Dashboard
    screen: Primary
    purpose: >-
      Review integrate production planning and sequencing across daily build,
      schedule adjustments, and line balancing to reduce cogs, improve otif, and
      strengthen multi-plant alignment. and approve the recommended action.
