decision: >-
  Generate ongoing analytics on inventory turns and DOS to drive policy changes;
  assess and recommend changes to carrying costs and inventory policy;
  root-cause inventory discrepancies and decide corrective actions; identify
  opportunities for continuous inventory process improvements.
input:
  financial_context:
    annual_revenue: 184992000001
    cogs: 158434000000
    ebitda: 12786000000
    inventory_value: 14951000000
  trigger: Daily inventory data update from SAP S/4HANA.
  parameters:
    objective: >-
      Monitor and optimize inventory performance by analyzing inventory turns,
      days of supply, carrying costs, and identifying root causes of
      discrepancies.
    key_inputs:
      - Inventory Turnover Data
      - Carrying Cost Data
      - Inventory Discrepancy Records
      - Process Improvement Opportunities
    source_systems:
      - SAP S/4HANA
expected_output:
  action: >-
    Generate regular reports on inventory turns and days of supply metrics;
    analyze and report on the financial carrying costs of Ford's inventory;
    investigate and resolve root causes of significant inventory discrepancies;
    implement identified process improvements in inventory planning.
  outcome: >-
    Reduced carrying costs, minimized stockouts, improved COGS, and enhanced
    overall inventory health.
  affected_components:
    - DDM/Crawlers
    - Cortex Auto Forecast
    - RCA Service
    - CWB Lifecycle
    - Notification
    - Dashboard
rationale: >-
  Combining deterministic, agentic, and generative decision intelligence enables
  autonomous monitoring and optimization of inventory performance, leading to
  better decision-making and cost reduction.
