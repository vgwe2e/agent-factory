source_systems:
  - name: SAP S/4HANA
    type: ERP
    status: identified
aera_ingestion:
  - stream_name: inventory-turnover-data
    stream_type: Event Stream
    source: SAP S/4HANA
  - stream_name: carrying-cost-data
    stream_type: Event Stream
    source: SAP S/4HANA
  - stream_name: inventory-discrepancy-records
    stream_type: Event Stream
    source: SAP S/4HANA
  - stream_name: process-improvement-opportunities
    stream_type: Event Stream
    source: SAP S/4HANA
processing:
  - component: Cortex Auto Forecast
    type: cortex
    function: Generate insights on inventory performance.
  - component: RCA Service
    type: cortex
    function: Identify underlying issues.
  - component: CWB Lifecycle
    type: process_builder
    function: Drive continuous improvement.
  - component: Notification
    type: process_builder
    function: Ensure transparency and accountability.
ui_surface:
  - component: Dashboard
    screen: Primary
    purpose: >-
      Review monitor and optimize inventory performance by analyzing inventory
      turns, days of supply, carrying costs, and identifying root causes of
      discrepancies. and approve the recommended action.
