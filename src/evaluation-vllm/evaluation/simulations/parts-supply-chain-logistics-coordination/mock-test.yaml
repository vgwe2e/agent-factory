decision: >-
  Forecast recall parts demand, manage inventory levels, coordinate
  distribution, handle defective part returns, and dispose of obsolete/surplus
  parts.
input:
  financial_context:
    annual_revenue: 184992000001
    cogs: 158434000000
    ebitda: 12786000000
    inventory_value: 14951000000
  trigger: Start of recall campaign or periodic inventory review.
  parameters:
    objective: >-
      Optimize recall parts supply chain and logistics coordination to reduce
      working capital, prevent stockouts, and improve OTIF while lowering COGS
      and EBITDA.
    key_inputs:
      - Recall Campaign Data
      - Inventory Levels
      - Logistics Costs
      - Defective Part Returns
      - Obsolete/Surplus Parts
    source_systems:
