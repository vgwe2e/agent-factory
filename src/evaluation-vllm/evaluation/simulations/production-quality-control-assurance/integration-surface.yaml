  - stream_name: end-of-line-audit-results
    stream_type: Event Stream
    source: SAP S/4HANA
  - stream_name: non-conformance-reports
    stream_type: Event Stream
    source: SAP S/4HANA
  - stream_name: quality-control-plans
    stream_type: Event Stream
    source: SAP S/4HANA
  - stream_name: incoming-material-data
