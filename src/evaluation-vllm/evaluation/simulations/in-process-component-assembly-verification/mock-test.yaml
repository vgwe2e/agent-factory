      To autonomously decide and execute inspection actions, prioritize critical
      checks, and route exceptions with predefined remediation for in-process
      component and assembly verification.
    key_inputs:
      - Component Dimensions
      - Functional Test Results
      - Torque Audit Data
      - Material & Finish Quality Data
      - Sealing & Leakage Test Results
    source_systems:
