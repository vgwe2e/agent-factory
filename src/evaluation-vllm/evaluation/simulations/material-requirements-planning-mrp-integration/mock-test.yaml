decision: >-
  Release and maintain accurate BOMs for configurations/markets; compute net
  component requirements from MPS; generate and transmit material release
  schedules to suppliers; define optimal inventory policies; assess parts
  shortage risks and take preemptive actions.
input:
  financial_context:
    annual_revenue: 184992000001
    cogs: 158434000000
    ebitda: 12786000000
    inventory_value: 14951000000
  trigger: Periodic MRP run initiated by SAP S/4HANA.
  parameters:
    objective: >-
      Integrate Material Requirements Planning (MRP) across BOM release,
      material requirements calculation, supplier release, inventory policy, and
      shortage risk assessment to optimize BOM integrity, proactive material
      planning, supplier coordination, and dynamic safety stock, reducing COGS
      and improving OTIF and working capital.
    key_inputs:
      - BOM Data
      - MPS Data
      - Supplier Data
      - Inventory Data
      - Shortage Data
    source_systems:
      - SAP S/4HANA
expected_output:
  action: >-
    Accurate BOM release and maintenance; net component requirements
    calculation; supplier release generation and transmission; optimal inventory
    policy definition; proactive shortage risk assessment and action.
  outcome: >-
    Reduced COGS, improved OTIF, and optimized working capital through enhanced
    MRP processes.
  affected_components:
    - DDM/Crawler
    - STREAMS
    - RCA Service
    - Process Builder
    - Safety Stock Service
    - Remote Functions
    - Dashboard
rationale: >-
  Automate end-to-end MRP decisions to improve efficiency, reduce costs, and
  enhance service levels across multi-echelon automotive networks.
