source_systems:
  - name: SAP S/4HANA
    type: ERP
    status: identified
aera_ingestion:
  - stream_name: inventory-levels
    stream_type: Event Stream
    source: SAP S/4HANA
  - stream_name: demand-forecasts
    stream_type: Event Stream
    source: Cortex Auto Forecast
  - stream_name: transportation-costs
    stream_type: Event Stream
    source: STREAMS
processing:
  - component: Cortex Auto Forecast
    type: cortex
    function: To predict future demand for powertrains.
  - component: AutoML
    type: process_builder
    function: To determine optimal inventory positions.
  - component: Remote Functions
    type: process_builder
    function: To prepare and document shipments.
  - component: UI Screens
    type: process_builder
    function: To monitor shipments and ensure timely delivery.
ui_surface:
  - component: Dashboard
    screen: Primary
    purpose: >-
      Review reduce cogs by optimizing inventory positioning, transportation
      routing, and production-aligned load sequencing for finished powertrains.
      and approve the recommended action.
