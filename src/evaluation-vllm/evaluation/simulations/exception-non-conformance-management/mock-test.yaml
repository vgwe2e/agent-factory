  outcome: >-
    Faster containment, optimized rework, minimized scrap, and accelerated
    root-cause remediation leading to reduced COGS and improved OTIF and line
    efficiency.
  affected_components:
    - DDM/Crawlers
    - Cortex Monitoring
    - CWB Lifecycle
    - Remote Functions
    - Cortex Monitoring
    - Notification
    - Dashboard
rationale: >-
  Automating exception handling reduces manual intervention, ensures
