source_systems:
  - name: SAP S/4HANA
    type: ERP
    status: identified
aera_ingestion:
  - stream_name: inventory-levels
    stream_type: Event Stream
    source: SAP S/4HANA
  - stream_name: historical-sales-data
    stream_type: Event Stream
    source: SAP S/4HANA
  - stream_name: supply-chain-network-map
    stream_type: Event Stream
    source: SAP S/4HANA
processing:
  - component: Cortex Auto Forecast
    type: cortex
    function: Generate accurate demand forecasts.
  - component: Safety Stock Service
    type: cortex
    function: Balance stockout risk against carrying costs.
  - component: CWB Lifecycle
    type: process_builder
    function: Ensure alignment with business policies.
  - component: Process Builder
    type: process_builder
    function: Optimize service levels and COGS.
  - component: Remote Functions
    type: process_builder
    function: Enforce new policies and rules.
ui_surface:
  - component: Dashboard
    screen: Primary
    purpose: >-
      Review optimize stock positioning, safety stock policies, deployment
      rules, and obsolescence/excess handling across the automotive supply
      network. and approve the recommended action.
