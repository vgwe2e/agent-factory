decision: >-
  Approve die designs, manage fabrication & sourcing, plan maintenance, optimize
  changeover, validate new dies, and analyze life cycle costs.
input:
  financial_context:
    annual_revenue: 184992000001
    cogs: 158434000000
    ebitda: 12786000000
    inventory_value: 14951000000
  trigger: New die design submission or maintenance request.
  parameters:
    objective: >-
      Reduce COGS, improve yield, and accelerate time-to-market for die-related
      productions by coordinating deterministic and agentic decisions across
      design approvals, sourcing, maintenance, and changeover.
    key_inputs:
      - Die Design Submission
      - Maintenance Request
      - Fabrication & Sourcing Data
      - Changeover Data
      - Validation Data
      - Life Cycle Cost Data
