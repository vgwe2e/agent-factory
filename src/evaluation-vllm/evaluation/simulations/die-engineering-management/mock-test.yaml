    Automate and optimize die design approval, sourcing, maintenance scheduling,
    changeover, validation, and life cycle costing.
  outcome: >-
    Reduced COGS, improved yield, accelerated time-to-market, minimized
    downtime, and optimized cost of ownership.
  affected_components:
    - DDM/Crawlers
    - AutoML
    - CWB Lifecycle
    - Process Builder
    - Exception Management
    - Dashboard
