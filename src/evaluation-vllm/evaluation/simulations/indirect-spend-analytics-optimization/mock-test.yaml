decision: Identify and execute cost-saving opportunities from indirect spend data.
input:
  financial_context:
    annual_revenue: 184992000001
    cogs: 158434000000
    ebitda: 12786000000
    inventory_value: 14951000000
  trigger: Periodic data refresh from SAP S/4HANA.
  parameters:
