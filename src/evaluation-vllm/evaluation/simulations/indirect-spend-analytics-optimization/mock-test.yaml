      Implement an indirect spend analytics and optimization initiative to
      autonomously identify and realize indirect spend opportunities across the
      enterprise.
    key_inputs:
      - Indirect Spend Data
      - Consumption Patterns
      - Savings Tracking Data
    source_systems:
