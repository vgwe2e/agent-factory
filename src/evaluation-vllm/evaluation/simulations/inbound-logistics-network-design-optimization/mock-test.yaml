decision: >-
  Jointly optimize logistics network design, carrier strategy, mode/lanes, and
  warehouse footprint.
input:
  financial_context:
    annual_revenue: 184992000001
    cogs: 158434000000
    ebitda: 12786000000
    inventory_value: 14951000000
  trigger: Periodic review of inbound logistics network performance and cost analysis.
  parameters:
    objective: >-
      Optimize inbound logistics network design, carrier strategy, mode/lanes,
      and warehouse footprint to reduce COGS, lower working capital, and improve
      on-time delivery.
    key_inputs:
      - Historical Logistics Data
      - Carrier Contracts
      - Warehouse Locations
      - Transportation Modes and Lanes
    source_systems:
      - SAP S/4HANA
expected_output:
  action: >-
    Run simulations, select optimal network configurations, carriers, and modes,
    and implement changes.
  outcome: >-
    Reduced inbound COGS, lower working capital, improved on-time delivery, and
    enhanced sustainability.
  affected_components:
    - DDM/Crawlers
    - AutoML
    - Remote Functions
    - CWB Lifecycle
    - Dashboard
rationale: >-
  Coordinating multiple L4 decisions with constraint-aware automation will cut
  inbound costs and stockouts, accelerate decision cycles, and improve overall
  logistics efficiency.
