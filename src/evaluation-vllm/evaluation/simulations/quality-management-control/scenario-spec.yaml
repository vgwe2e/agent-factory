objective: Reduce COGS and improve yield through cohesive quality management and control.
trigger: Start of production line cycle or receipt of new supplier parts.
decision: >-
  Determine quality checks, resource allocation, defect countermeasures, process
  improvements, supplier part inspections, and regulatory compliance actions.
expected_action: >-
  Trigger additional quality checks, allocate resources for audits, deploy
  defect countermeasures, implement process improvements, schedule supplier part
  inspections, verify regulatory compliance.
expected_outcome: >-
  Reduced rework and scrap, improved first-pass yields, lowered warranty costs,
  enhanced OTIF performance.
rationale: >-
  By integrating deterministic and agentic decisions across various quality
  checkpoints, Ford can achieve significant cost savings and quality
  improvements.
source_systems:
  - name: SAP S/4HANA
    type: ERP
    status: identified
key_inputs:
  - name: In-Process Quality Data
    source: SAP S/4HANA
    purpose: Trigger additional checks
    preferred_stream_type: STREAMS
  - name: End-of-Line Audit Results
    source: SAP S/4HANA
    purpose: Resource allocation
    preferred_stream_type: STREAMS
  - name: Defect Data
    source: SAP S/4HANA
    purpose: Countermeasure deployment
    preferred_stream_type: STREAMS
  - name: FTT Yield Metrics
    source: SAP S/4HANA
    purpose: Process improvement selection
    preferred_stream_type: STREAMS
  - name: Supplier Part Quality Data
    source: SAP S/4HANA
    purpose: Inspection scheduling
    preferred_stream_type: STREAMS
  - name: Regulatory Compliance Data
    source: SAP S/4HANA
    purpose: Compliance verification
    preferred_stream_type: STREAMS
happy_path:
  - step: Collect in-process quality data
    stage: ingest
    component: DDM/Crawlers
    purpose: Trigger additional checks
  - step: Analyze end-of-line audit results
    stage: analyze
    component: Cortex Monitoring
    purpose: Resource allocation
  - step: Identify defects and countermeasures
    stage: analyze
    component: RCA Service
    purpose: Countermeasure deployment
  - step: Monitor and improve FTT yield
    stage: analyze
    component: Cortex Auto Forecast
    purpose: Process improvement selection
  - step: Inspect supplier parts
    stage: analyze
    component: STREAMS
    purpose: Inspection scheduling
  - step: Verify regulatory compliance
    stage: analyze
    component: Remote Functions
    purpose: Compliance verification
branches:
  - condition: High defect rate detected
    response: Trigger additional in-process checks
    outcome: Reduced rework and scrap
  - condition: Supplier part fails inspection
    response: Schedule rework
    outcome: Maintained CQA standards
  - condition: Non-compliance with regulations
    response: Initiate corrective actions
    outcome: Ensured regulatory compliance
