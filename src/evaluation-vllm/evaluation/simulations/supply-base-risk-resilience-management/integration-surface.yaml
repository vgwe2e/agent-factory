source_systems:
  - name: SAP S/4HANA
    type: ERP
    status: identified
aera_ingestion:
  - stream_name: supply-chain-data
    stream_type: Event Stream
    source: SAP S/4HANA
  - stream_name: material-shortage-alerts
    stream_type: Event Stream
    source: SAP S/4HANA
  - stream_name: supplier-financial-data
    stream_type: Event Stream
    source: SAP S/4HANA
processing:
  - component: AutoML
    type: cortex
    function: To detect potential risks in the supply chain.
  - component: RCA Service
    type: cortex
    function: To assess supplier financial stability and take actions.
  - component: Process Builder
    type: process_builder
    function: To create proactive strategies for supply continuity.
  - component: CWB Lifecycle
    type: process_builder
    function: To enable human-in-the-loop decision-making.
ui_surface:
  - component: Dashboard
    screen: Primary
    purpose: >-
      Review jointly optimize supply risk detection, contingency sourcing, and
      financial health guardrails across ford's multi-echelon supplier network.
      and approve the recommended action.
