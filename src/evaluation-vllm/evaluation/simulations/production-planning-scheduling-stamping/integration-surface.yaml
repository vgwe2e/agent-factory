    stream_type: Event Stream
    source: SAP S/4HANA
  - stream_name: press-line-capacity-data
    stream_type: Event Stream
    source: SAP S/4HANA
  - stream_name: raw-material-inventory-levels
    stream_type: Event Stream
    source: SAP S/4HANA
  - stream_name: urgent-stamping-orders
    stream_type: Event Stream
    source: SAP S/4HANA
processing:
  - component: Cortex Auto Forecast
    type: cortex
    function: Optimize production sequencing and capacity allocation.
  - component: Safety Stock Service
    type: process_builder
    function: Maximize throughput and minimize idle capacity.
  - component: Remote Functions
    type: process_builder
    function: Manage urgent stamping orders.
