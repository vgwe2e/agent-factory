decision: >-
  Integrate stamping build plan forecasts, generate daily production schedules,
  allocate capacity, manage MRP, and handle expedited orders.
input:
  financial_context:
    annual_revenue: 184992000001
    cogs: 158434000000
    ebitda: 12786000000
    inventory_value: 14951000000
  trigger: Daily start of production planning cycle.
  parameters:
    objective: >-
      Optimize stamping demand forecasting, daily production sequencing,
      capacity utilization, MRP for stamping, and expedited order management to
      reduce COGS, improve on-time delivery, and decrease working capital.
    key_inputs:
      - Vehicle Build Plan Forecasts
      - Press Line Capacity Data
      - Raw Material Inventory Levels
      - Urgent Stamping Orders
    source_systems:
      - SAP S/4HANA
expected_output:
  action: >-
    Generate optimized production schedules, allocate capacity, manage MRP, and
    handle expedited orders.
  outcome: >-
    Reduced COGS, improved on-time delivery, decreased working capital, and
    optimized capacity utilization.
  affected_components:
    - DDM/Crawlers
    - STREAMS
    - Cortex Auto Forecast
    - Safety Stock Service
    - Remote Functions
    - Dashboard
rationale: >-
  By integrating multiple L4 activities through a deterministic and agentic mix,
  the solution aligns line sequencing, capacity, and expedited actions across
  plants and suppliers with real-time write-backs to MES, ERP, and supplier
  systems.
