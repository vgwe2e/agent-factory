source_systems:
  - name: SAP S/4HANA
    type: ERP
    status: identified
aera_ingestion:
  - stream_name: supplier-registration-data
    stream_type: Event Stream
    source: SAP S/4HANA
  - stream_name: quality-systems-evaluation
    stream_type: Event Stream
    source: SAP S/4HANA
  - stream_name: part-criticality-and-complexity-data
    stream_type: Event Stream
    source: SAP S/4HANA
  - stream_name: supplier-assessment-results
    stream_type: Event Stream
    source: SAP S/4HANA
processing:
  - component: AutoML
    type: cortex
    function: Classify suppliers based on quality systems and capabilities
  - component: Cortex Auto Forecast
    type: cortex
    function: Predict risk levels based on part criticality and complexity
  - component: CWB Lifecycle
    type: process_builder
    function: Present AI recommendations for supplier selection
  - component: Process Builder
    type: process_builder
    function: Automate onboarding workflow including resource allocation and training
  - component: RCA Service
    type: process_builder
    function: Identify strengths and weaknesses for supplier development
ui_surface:
  - component: Dashboard
    screen: Primary
    purpose: >-
      Review automate end-to-end supplier quality assessment and selection to
      optimize cogs, reduce supplier qualification cycles, and accelerate
      onboarding. and approve the recommended action.
