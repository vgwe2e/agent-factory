decision: >-
  Perform three-way match decisions (PO, GR, Invoice) including hold or release
  actions based on discrepancy severity and finance policies.
input:
  financial_context:
    annual_revenue: 184992000001
    cogs: 158434000000
    ebitda: 12786000000
    inventory_value: 14951000000
  trigger: New invoice received and goods receipt recorded in SAP S/4HANA.
  parameters:
    objective: >-
      Execute three-way match, detect invoice discrepancies, streamline goods
      receipt corrections, and authorize supplier payments to reduce working
      capital blocks and lower COGS leakage.
    key_inputs:
      - Purchase Order Details
      - Goods Receipt Records
      - Invoices
    source_systems:
