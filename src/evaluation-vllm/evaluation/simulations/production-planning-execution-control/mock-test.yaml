decision: >-
  Determine optimal daily build schedule, line sequencing, change order
  implementation, downtime recovery, OEE-driven improvements, and short-term
  volume adjustments.
input:
  financial_context:
    annual_revenue: 184992000001
    cogs: 158434000000
    ebitda: 12786000000
    inventory_value: 14951000000
  trigger: Daily production start or significant demand/capacity signal change.
  parameters:
    objective: >-
      Reduce COGS through optimized production planning and execution control,
      improving cost efficiency and on-time delivery.
    key_inputs:
      - Daily Build Schedule
      - Material Availability
      - Line Capacity
      - Change Orders
      - Downtime Events
      - OEE Metrics
      - Demand/Capacity Signals
    source_systems:
      - SAP S/4HANA
expected_output:
  action: >-
    Execute optimized production plans, adjust schedules, implement change
    orders, recover from downtimes, and make short-term volume adjustments.
  outcome: >-
    Improved adherence to build schedules, minimized cycle times, controlled
    COGS impact from change orders, reduced downtime impact, enhanced OEE, and
    balanced production volumes.
  affected_components:
    - DDM/Crawlers
    - Cortex Auto Forecast
    - CWB Lifecycle
    - Remote Functions
    - UI Screens
    - Dashboard
rationale: >-
  By integrating production planning and execution control into a unified
  decision engine, Ford can achieve better cost efficiency and on-time delivery
  across its multi-plant vehicle platforms.
