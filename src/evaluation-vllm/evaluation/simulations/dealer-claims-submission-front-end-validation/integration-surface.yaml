    stream_type: Event Stream
    source: SAP S/4HANA
  - stream_name: repair-order-documentation
    stream_type: Event Stream
    source: SAP S/4HANA
  - stream_name: pre-authorization-requests
    stream_type: Event Stream
    source: SAP S/4HANA
processing:
  - component: Process Builder
    type: process_builder
    function: Ensure all necessary documentation is included.
  - component: Notification
    type: process_builder
    function: Inform the dealer about the claim's status.
