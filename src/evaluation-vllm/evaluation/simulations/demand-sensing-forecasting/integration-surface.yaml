source_systems:
  - name: SAP S/4HANA
    type: ERP
    status: identified
aera_ingestion:
  - stream_name: market-trends-data
    stream_type: ETL
    source: External APIs
  - stream_name: historical-sales-data
    stream_type: ETL
    source: SAP S/4HANA
  - stream_name: product-lifecycle-data
    stream_type: ETL
    source: SAP S/4HANA
processing:
  - component: Cortex Auto Forecast
    type: cortex
    function: Predict demand 3-5 years out
  - component: AutoML
    type: cortex
    function: Optimize forecast bias and RMSE
  - component: CWB Lifecycle
    type: process_builder
    function: Aggregate and finalize monthly demand plans
  - component: RCA Service
    type: process_builder
    function: Identify areas for improvement in forecasting processes
ui_surface:
  - component: Dashboard
    screen: Primary
    purpose: >-
      Review unify and automate demand sensing and forecast optimization across
      multiple l4 processes to improve forecast accuracy, reduce working
      capital, and enhance service levels. and approve the recommended action.
