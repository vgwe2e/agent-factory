source_systems:
  - name: SAP S/4HANA
    type: ERP
    status: identified
aera_ingestion:
  - stream_name: demand-forecast
    stream_type: STREAMS
    source: SAP S/4HANA
  - stream_name: production-constraints
    stream_type: STREAMS
    source: SAP S/4HANA
  - stream_name: disruption-events
    stream_type: STREAMS
    source: SAP S/4HANA
processing:
  - component: Cortex Auto Forecast
    type: cortex
    function: Model the impact of demand variations on capacity
  - component: AutoML
    type: cortex
    function: Evaluate different production strategies and their capacity impacts
  - component: RCA Service
    type: cortex
    function: Identify and model the effects of supply chain disruptions
  - component: Remote Functions
    type: cortex
    function: Evaluate the financial impact of proposed capacity investments
  - component: CWB Lifecycle
    type: process_builder
    function: Enable human-in-the-loop review and approval of recommended actions
ui_surface:
  - component: Dashboard
    screen: Primary
    purpose: >-
      Review synthesize demand fluctuations, production scenarios, and
      disruption risks into an autonomous capacity planning engine that
      optimizes line sequencing, changeovers, plant/carrier assignments, and
      safety stock across multi-echelon automotive networks. and approve the
      recommended action.
