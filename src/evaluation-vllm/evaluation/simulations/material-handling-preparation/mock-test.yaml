decision: >-
  Decide intake inspection and acceptance criteria for raw material coils,
  determine coil slitting/blanks production plan, optimize storage levels and
  location of raw materials/blanks, plan timely delivery of material
  coils/blanks to presses, classify scrap and determine recycling/disposal path,
  investigate and resolve quality issues in incoming raw materials.
input:
  financial_context:
    annual_revenue: 184992000001
    cogs: 158434000000
    ebitda: 12786000000
    inventory_value: 14951000000
  trigger: >-
    Receipt of raw material coils and initiation of in-line processing
    activities.
  parameters:
    objective: >-
      Reduce working capital tied to inbound and in-plant inventories while
      improving COGS through optimized material flow and enhanced line
      readiness.
    key_inputs:
      - Raw Material Receipt Data
      - Production Demand Data
      - Inventory Levels
      - Press Line Status
      - Scrap Classification Data
      - Quality Issue Reports
    source_systems:
      - SAP S/4HANA
expected_output:
  action: >-
    Inspect and accept raw material coils based on predefined criteria, generate
    production plans for slitting and blanking operations, adjust storage levels
    and locations to optimize inventory, schedule deliveries to presses with
    minimal delays, segregate and prepare scrap materials for recycling or
    disposal, resolve quality issues with supplier remediation actions.
  outcome: Reduced working capital, minimized COGS, and improved line readiness.
  affected_components:
    - DDM/Crawlers
    - Remote Functions
    - Process Builder
    - Remote Functions
    - CWB Lifecycle
    - Dashboard
rationale: >-
  Automating and optimizing material handling and preparation processes will
  lead to better inventory management, reduced waste, and faster resolution of
  quality issues, resulting in improved financial performance.
