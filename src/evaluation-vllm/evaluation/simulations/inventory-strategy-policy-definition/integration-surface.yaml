processing:
  - component: Safety Stock Service
    type: cortex
    function: Determine new safety stock levels.
  - component: AutoML
    type: cortex
    function: Apply differentiated inventory policies.
  - component: Process Builder
    type: process_builder
    function: Establish VMI policies.
  - component: CWB Lifecycle
    type: process_builder
    function: Ensure human-in-the-loop validation.
ui_surface:
  - component: Dashboard
    screen: Primary
    purpose: >-
      Review optimize inventory strategy and policy definition across the
      automotive supply network to reduce working capital, lower cogs, and
      improve otif. and approve the recommended action.
