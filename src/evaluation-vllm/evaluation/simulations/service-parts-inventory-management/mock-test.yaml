decision: >-
  Forecast and determine replenishment quantities and timing for service parts,
  provide inventory optimization guidance, manage supercession and obsolescence,
  and ensure adequate stocking for warranty and recall parts.
input:
  financial_context:
    annual_revenue: 184992000001
    cogs: 158434000000
    ebitda: 12786000000
    inventory_value: 14951000000
  trigger: Periodic inventory check and demand forecast generation.
  parameters:
    objective: >-
      Optimize service parts inventory across dealer, distributor, and service
      network by forecasting demand, replenishing high-risk parts, optimizing
      inventory, managing obsolescence, and ensuring recall/warranty parts are
      stocked.
    key_inputs:
      - Historical Sales Data
      - Inventory Levels
      - Parts Supercession Data
      - Warranty and Recall Data
    source_systems:
      - SAP S/4HANA
expected_output:
  action: >-
    Generate replenishment orders, provide inventory optimization
    recommendations, manage part supercessions, and adjust safety stock levels.
  outcome: >-
    Reduced working capital, minimized stockouts, managed obsolescence risk, and
    maintained optimal inventory levels for recall and warranty parts.
  affected_components:
    - DDM/Crawlers
    - Cortex Auto Forecast
    - CWB Lifecycle
    - UI Screens
    - Remote Functions
    - Safety Stock Service
    - Dashboard
rationale: >-
  Leverage end-to-end visibility and real-time decisioning to optimize service
  parts inventory, improving margins and capturing incremental revenue in
  aftersales.
