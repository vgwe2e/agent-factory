source_systems:
  - name: SAP S/4HANA
    type: ERP
    status: identified
aera_ingestion:
  - stream_name: supplier-quality-audit-schedule
    stream_type: Event Stream
    source: SAP S/4HANA
  - stream_name: capa-records
    stream_type: Event Stream
    source: SAP S/4HANA
  - stream_name: process-capability-metrics
    stream_type: Event Stream
    source: SAP S/4HANA
  - stream_name: npi-phase-status
    stream_type: Event Stream
    source: SAP S/4HANA
  - stream_name: supplier-training-needs
    stream_type: Event Stream
    source: SAP S/4HANA
processing:
  - component: Action Item
    type: process_builder
    function: >-
      Automate audit scheduling and validation, track CAPA closure progress,
      prioritize process improvement initiatives, review NPI quality gates,
      initiate training programs.
  - component: Agentic AI
    type: agent_teams
    function: To provide insights and recommendations based on audit findings.
ui_surface:
  - component: Dashboard
    screen: Primary
    purpose: >-
      Review autonomous management of supplier quality audits, capa cycles,
      process capability improvements, npi quality gating, and supplier training
      to reduce cogs, accelerate time-to-market, and improve otif with
      suppliers. and approve the recommended action.
