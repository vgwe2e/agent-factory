decision: >-
  Generate and release daily production schedules, plan raw material
  replenishment, manage internal logistics, monitor capacity utilization, and
  identify/resolve bottlenecks.
input:
  financial_context:
    annual_revenue: 184992000001
    cogs: 158434000000
    ebitda: 12786000000
    inventory_value: 14951000000
  trigger: Daily production planning cycle start.
  parameters:
    objective: >-
      Optimize daily production scheduling, material replenishment, and capacity
      utilization to reduce COGS, protect revenue, and improve working capital.
    key_inputs:
      - Line Capacity Data
      - Material Availability Data
      - Throughput Targets
      - Inventory Levels
      - AGV Status
    source_systems:
      - SAP S/4HANA
expected_output:
  action: >-
    Generate and release daily production schedules, plan and execute raw
    material replenishment, manage internal logistics and AGV movements, monitor
    and adjust capacity utilization, identify and resolve production
    bottlenecks.
  outcome: >-
    Reduced COGS, improved on-time delivery, optimized working capital, and
    enhanced production efficiency.
  affected_components:
    - DDM/Crawlers
    - Process Builder
    - Process Builder
    - Dashboard
rationale: >-
  Jointly optimizing production scheduling, material flow, and capacity
  utilization will lead to significant cross-domain gains in production cost,
  inventory, and delivery performance.
