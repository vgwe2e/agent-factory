source_systems:
  - name: SAP S/4HANA
    type: ERP
    status: identified
aera_ingestion:
  - stream_name: engineering-change-orders
    stream_type: Event Stream
    source: SAP S/4HANA
  - stream_name: production-volume-changes
    stream_type: Event Stream
    source: SAP S/4HANA
  - stream_name: contract-disputes
    stream_type: Event Stream
    source: SAP S/4HANA
processing:
  - component: Cortex Auto Forecast
    type: cortex
    function: Evaluate the financial impact of engineering changes.
  - component: CWB Lifecycle
    type: process_builder
    function: Negotiate price adjustments with suppliers.
  - component: Process Builder
    type: process_builder
    function: Draft formal contract amendments based on negotiated terms.
  - component: Remote Functions
    type: process_builder
    function: Write back contract amendments to SAP S/4HANA.
ui_surface:
  - component: Dashboard
    screen: Primary
    purpose: >-
      Review autonomous detection, coordination, and execution of commercial
      changes across engineering, volume/schedule planning, and contract
      management to optimize cogs and onboarding of supplier terms. and approve
      the recommended action.
