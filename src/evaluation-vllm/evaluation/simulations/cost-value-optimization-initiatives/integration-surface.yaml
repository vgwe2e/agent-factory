source_systems:
  - name: SAP S/4HANA
    type: ERP
    status: identified
aera_ingestion:
  - stream_name: vehicle-line-costs
    stream_type: Event Stream
    source: SAP S/4HANA
  - stream_name: component-costs
    stream_type: Event Stream
    source: SAP S/4HANA
  - stream_name: va-ve-proposals
    stream_type: Event Stream
    source: Engineering Teams
  - stream_name: commodity-market-data
    stream_type: Event Stream
    source: External APIs
processing:
  - component: Cortex Auto Forecast
    type: cortex
    function: Evaluate total cost of ownership across vehicle lines.
  - component: AutoML
    type: cortex
    function: >-
      Compare estimated vs actual component costs under multiple market
      scenarios.
  - component: RCA Service
    type: cortex
    function: Determine strategies to mitigate their impact on profitability.
  - component: CWB Lifecycle
    type: process_builder
    function: Select which changes to pursue given constraints and impact.
  - component: Remote Functions
    type: process_builder
    function: Ensure effective execution and continuous improvement.
ui_surface:
  - component: Dashboard
    screen: Primary
    purpose: >-
      Review reduce cogs in ford's multi-site automotive supply chain through
      coordinated cost engineering and dynamic supplier negotiations. and
      approve the recommended action.
