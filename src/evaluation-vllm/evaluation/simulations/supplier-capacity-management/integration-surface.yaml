source_systems:
  - name: SAP S/4HANA
    type: ERP
    status: identified
aera_ingestion:
  - stream_name: supplier-capacity-commitments
    stream_type: Event Stream
    source: SAP S/4HANA
  - stream_name: production-part-capacity-data
    stream_type: Event Stream
    source: SAP S/4HANA
  - stream_name: supplier-risk-assessment-data
    stream_type: Event Stream
    source: SAP S/4HANA
  - stream_name: capacity-expansion-requests
    stream_type: Event Stream
    source: SAP S/4HANA
  - stream_name: tier-n-supplier-capacity-data
    stream_type: Event Stream
    source: SAP S/4HANA
processing:
  - component: Process Builder
    type: cortex
    function: Review and formalize supplier capacity commitments.
  - component: CWB Lifecycle
    type: process_builder
    function: Approve supplier capacity expansion requests.
  - component: Process Builder
    type: process_builder
    function: Monitor and support critical sub-tier suppliers.
ui_surface:
  - component: Dashboard
    screen: Primary
    purpose: >-
      Review optimize supplier capacity commitments, validate production-part
      capacity, assess risk, route capacity expansion decisions, and monitor
      tiered supplier capacity to reduce cogs, improve otif, and strengthen
      supply resilience. and approve the recommended action.
