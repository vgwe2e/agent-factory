source_systems:
  - name: SAP S/4HANA
    status: identified
aera_ingestion:
  - stream_name: production_events
    stream_type: Event Stream
    source: SAP S/4HANA
  - stream_name: supply_disruption_events
    stream_type: Event Stream
    source: SAP S/4HANA
  - stream_name: schedule_recovery_events
    stream_type: Event Stream
    source: SAP S/4HANA
  - stream_name: escalation_events
    stream_type: Event Stream
    source: SAP S/4HANA
processing:
  - component: production_stop_start_decision
    type: Decision Engine
    function: autonomously detect and resolve production stop/start constraints
  - component: supply_disruption_analysis
    type: Analysis Engine
    function: analyze supply disruption impact and suggest recovery
  - component: schedule_recovery_planner
    type: Planning Engine
    function: plan schedule recovery after disruptions
  - component: escalation_manager
    type: Workflow Engine
    function: manage escalations for critical issues
  - component: quality_hold_adjuster
    type: Adjustment Engine
    function: adjust build plans for quality holds
ui_surface:
  - component: production_stop_start_decision
    screen: Production Stop/Start Dashboard
    purpose: Monitor and manage production stop/start decisions
  - component: supply_disruption_analysis
    screen: Supply Disruption Dashboard
    purpose: Analyze and respond to supply disruptions
  - component: schedule_recovery_planner
    screen: Schedule Recovery Planner
    purpose: Plan and execute schedule recovery
  - component: escalation_manager
    screen: Escalation Management Console
    purpose: Manage escalations for critical issues
  - component: quality_hold_adjuster
    screen: Quality Hold Management
    purpose: Adjust build plans for quality holds
