streams:
  - name: production_status_stream
    purpose: Real-time machine status and output data for production line monitoring
    confidence: confirmed
  - name: supply_chain_stream
    purpose: Material availability and supplier status data for disruption tracking
    confidence: confirmed
  - name: quality_hold_stream
    purpose: >-
      Quality inspection results and hold status data for quality hold
      management
    confidence: confirmed
  - name: demand_signal_stream
    purpose: Order and forecast demand data for production planning alignment
    confidence: confirmed
cortex:
  - name: constraint_detection_model
    purpose: AI model for autonomously detecting production constraints and exceptions
    confidence: inferred
  - name: simulation_engine
    purpose: AI model for simulating disruption impacts and recovery scenarios
    confidence: inferred
  - name: resolution_optimization_model
    purpose: AI model for selecting optimal resolution paths balancing COGS and OTIF
    confidence: inferred
process_builder:
  - name: Rules
    purpose: Decision logic for production stop/start based on constraints and demand
    confidence: confirmed
  - name: Script
    purpose: Execution of supply disruption impact analysis and alternative assessment
    confidence: confirmed
  - name: Notification
    purpose: >-
      Automated escalation alerts for critical issues requiring management
      intervention
    confidence: confirmed
  - name: Branch
    purpose: Routing logic for escalation paths based on issue severity and risk
    confidence: confirmed
agent_teams:
  - name: production_line_team
    purpose: Manages production stop/start decisions and line sequencing
    confidence: inferred
  - name: supply_chain_team
    purpose: Handles supply disruption impact analysis and alternative sourcing
    confidence: inferred
  - name: scheduling_team
    purpose: Develops and implements schedule recovery plans post-disruption
    confidence: inferred
  - name: quality_management_team
    purpose: Adjusts build plans for quality holds with repair/rework options
    confidence: inferred
ui:
  - name: dashboard
    purpose: Real-time monitoring of constraint status and exception metrics
    confidence: confirmed
  - name: table
    purpose: Displaying detailed constraint data with resolution status tracking
    confidence: confirmed
  - name: popup
    purpose: Critical issue alerts with recommended resolution paths for escalation
    confidence: confirmed
  - name: input_field
    purpose: Manual override inputs for quality hold adjustments and plan modifications
    confidence: confirmed
