source_systems:
  - name: SAP S/4HANA
    type: ERP
    status: identified
aera_ingestion:
  - stream_name: initial_piece_price
    stream_type: Reference Stream
    source: SAP S/4HANA
  - stream_name: annual_price_reviews
    stream_type: Event Stream
    source: SAP S/4HANA
  - stream_name: raw_material_indexing
    stream_type: Reference Stream
    source: SAP S/4HANA
  - stream_name: should_cost_models
    stream_type: Reference Stream
    source: SAP S/4HANA
  - stream_name: tooling_payments
    stream_type: Event Stream
    source: SAP S/4HANA
processing:
  - component: Initial Piece Price Determination
    type: deterministic
    function: Initial Piece Price Determination & Negotiation
  - component: Annual Price Review
    type: deterministic
    function: Annual Price Review & Renegotiation
  - component: Raw Material Indexing
    type: deterministic
    function: Raw Material Indexing & Adjustment Processing
  - component: Should Cost Modeling
    type: deterministic
    function: Should Cost Modeling & Validation
