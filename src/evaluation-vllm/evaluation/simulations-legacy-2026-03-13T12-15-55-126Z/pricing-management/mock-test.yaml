  price points and negotiation stance to optimize COGS
input:
  financial_context:
    Annual Revenue: 184992000001
    COGS: 158434000000
    EBITDA: 12786000000
    Working Capital: unknown
    Inventory Value: 14951000000
  trigger: New component introduction for Model X production line
expected_output:
  action: Set initial piece price at $125.50 per unit with 3% volume discount
