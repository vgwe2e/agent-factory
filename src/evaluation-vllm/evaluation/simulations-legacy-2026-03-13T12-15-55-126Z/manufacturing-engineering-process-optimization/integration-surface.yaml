source_systems:
  - name: SAP S/4HANA
    type: ERP
    status: identified
aera_ingestion:
  - stream_name: production_events
    stream_type: Event Stream
    source: SAP S/4HANA
  - stream_name: inventory_levels
    stream_type: Reference Stream
    source: SAP S/4HANA
processing:
  - component: line_sequencing_optimization
    type: Optimization Engine
    function: Deterministic optimization of production sequencing and line/layout
  - component: inventory_optimization
    type: Optimization Engine
    function: Multi-echelon inventory positioning
ui_surface:
  - component: line_sequencing_optimization
    screen: Production Sequencing Dashboard
    purpose: Monitor and adjust production sequencing plans
  - component: inventory_optimization
    screen: Inventory Positioning Dashboard
    purpose: Monitor and adjust multi-echelon inventory levels
