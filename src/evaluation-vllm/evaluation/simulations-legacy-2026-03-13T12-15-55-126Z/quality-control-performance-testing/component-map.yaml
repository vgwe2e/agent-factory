streams:
  - name: test_data_stream
    purpose: >-
      Ingest and process real-time test data from dyno/hot tests, transmission
      tests, and in-process inspections
    confidence: confirmed
  - name: quality_inspection_stream
    purpose: >-
      Aggregate quality check results and non-conformity data from assembly
      lines
    confidence: confirmed
cortex:
  - name: root_cause_analysis
    purpose: >-
      Apply AI models to identify defect patterns and prioritize corrective
      actions from quality data
    confidence: inferred
  - name: test_sequence_optimizer
    purpose: >-
      Optimize test sequencing using deterministic algorithms for engine
      dyno/hot tests and transmission testing
    confidence: inferred
process_builder:
  - name: Process
    purpose: >-
      Orchestrate end-to-end quality control workflow across all test stages and
      disposition decisions
    confidence: confirmed
  - name: Rules
    purpose: >-
      Determine test sequencing, resource allocation, and disposition paths
      (rework/scrap/concession) based on constraints
    confidence: confirmed
  - name: Data View
    purpose: >-
      Display real-time inspection data and test results for in-process quality
      checks
    confidence: confirmed
  - name: Report Data
    purpose: >-
      Collect and aggregate test data from dyno/hot tests, transmission tests,
      and quality inspections
    confidence: confirmed
  - name: Data Science
    purpose: >-
      Execute root cause analysis on quality defects and generate corrective
      action recommendations
    confidence: confirmed
agent_teams:
  - name: Test_Sequencing_Team
    purpose: >-
      Coordinate engine dyno/hot test configurations and sequence optimization
      across multiple vehicle programs
    confidence: inferred
  - name: Disposition_Authorization_Team
    purpose: >-
      Handle non-conforming product disposition decisions
      (rework/scrap/concession) with working capital impact analysis
    confidence: inferred
  - name: Quality_Analysis_Team
    purpose: >-
      Perform root cause analysis and drive preventive measures for recurring
      manufacturing defects
    confidence: inferred
ui:
  - name: table
    purpose: >-
      Display test results, inspection data, and disposition status in a
      structured format
    confidence: confirmed
  - name: report
    purpose: >-
      Visualize aggregated quality data, defect trends, and root cause analysis
      findings
    confidence: confirmed
  - name: dropdown
    purpose: >-
      Select test configurations, resource constraints, and disposition options
      during test sequencing
    confidence: confirmed
  - name: button
    purpose: >-
      Trigger test execution, disposition authorization, and rework request
      actions
    confidence: confirmed
